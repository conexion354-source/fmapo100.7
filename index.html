<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FM Apocalipsis 100.7</title>

  <meta name="theme-color" content="#2f5f5a" />
  <meta name="description" content="FM Apocalipsis 100.7 - Radio cristiana online" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logo.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 25%),
        linear-gradient(180deg, #3f736d 0%, #2f5f5a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .player {
      position: relative;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 30px;
      padding: 20px;
      box-shadow:
        0 12px 35px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .live-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .02em;
      z-index: 2;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255,255,255,.16);
      color: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 8px 18px rgba(0,0,0,.14);
      transition: background .25s ease, color .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .live-badge.active {
      background: linear-gradient(135deg, #ff5f5f, #ff2f2f);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(255, 59, 59, .25);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: .9;
      box-shadow: 0 0 0 4px rgba(255,255,255,.08);
    }

    .live-badge.active .live-dot {
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.16);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,.55); }
      70% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      margin-top: 22px;
    }

    .logo {
      width: 150px;
      max-width: 72%;
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .title {
      text-align: center;
      margin: 0;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .subtitle {
      text-align: center;
      margin: 6px 0 18px;
      color: rgba(255,255,255,.82);
      font-size: .98rem;
    }

    .status {
      text-align: center;
      margin-bottom: 18px;
      font-size: .95rem;
      color: #eaf7f4;
      min-height: 22px;
      font-weight: 600;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: rgba(255,255,255,.92);
      color: #173531;
    }

    .btn-primary.playing {
      background: linear-gradient(135deg, #ff8b8b, #ff5f5f);
      color: #fff;
      box-shadow: 0 12px 22px rgba(255, 95, 95, .32);
    }

    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #33d17a, #1faa59);
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
    }

    .btn-youtube {
      background: linear-gradient(135deg, #ff8f8f, #ff6666);
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
    }

    .full {
      width: 100%;
      margin-top: 10px;
    }

    .link-btn {
      display: block;
      text-decoration: none;
    }

    .hint {
      text-align: center;
      color: rgba(255,255,255,.78);
      font-size: .88rem;
      margin-top: 12px;
      min-height: 18px;
    }

    .weather-widget,
    .today-program-widget {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .weather-left,
    .today-program-left {
      flex: 1;
      min-width: 0;
    }

    .weather-main,
    .today-program-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      color: #fff;
    }

    .weather-location,
    .today-program-subtitle,
    .today-program-hosts {
      font-size: 13px;
      opacity: 0.82;
      margin-top: 4px;
    }

    .weather-right img,
    .card-icon {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon {
      font-size: 1.55rem;
    }

    .dot {
      margin: 0 5px;
      opacity: 0.7;
    }

    .today-program-widget[hidden] {
      display: none;
    }

    .notify-btn {
      margin-top: 10px;
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 12px 14px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
    }

    .notify-btn[hidden] {
      display: none;
    }

    @media (max-width: 430px) {
      .live-badge {
        font-size: .76rem;
        padding: 7px 10px;
      }

      .logo-wrap {
        margin-top: 26px;
      }

      .logo {
        width: 138px;
        max-width: 68%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="player">
      <div class="live-badge" id="liveBadge">
        <span class="live-dot"></span>
        <span>EN VIVO</span>
      </div>

      <div class="logo-wrap">
        <img src="logo.png" alt="FM Apocalipsis 100.7" class="logo" />
      </div>

      <h1 class="title">FM Apocalipsis 100.7</h1>
      <p class="subtitle">Radio cristiana online</p>

      <div class="status" id="status">Listo para reproducir</div>

      <audio id="radio" preload="none" playsinline>
        <source src="https://radios.solumedia.com:6322/stream" type="audio/mpeg" />
      </audio>

      <div class="controls">
        <button class="btn btn-primary" id="playBtn">▶ Play</button>
        <button class="btn btn-secondary" id="pauseBtn">⏸ Pausa</button>
      </div>

      <button class="btn btn-primary full" id="installBtn" hidden>📲 Instalar App</button>
      <button class="notify-btn" id="notifyBtn">🔔 Activar avisos de programas</button>

      <a
        class="link-btn"
        href="https://chat.whatsapp.com/FQnkIaic0ZEKR5nYNmheOV?mode=hq2tswi"
        target="_blank"
        rel="noopener noreferrer"
      >
        <button class="btn btn-whatsapp full" type="button">💬 Unirse al grupo de WhatsApp</button>
      </a>

      <a
        class="link-btn"
        href="https://www.youtube.com/@zonafe"
        target="_blank"
        rel="noopener noreferrer"
      >
        <button class="btn btn-youtube full" type="button">▶ Mira Zona Fe en vivo</button>
      </a>

      <div class="today-program-widget" id="todayProgramWidget" hidden>
        <div class="today-program-left">
          <div class="today-program-title" id="todayProgramTitle">Programa | Hoy</div>
          <div class="today-program-subtitle" id="todayProgramTime"></div>
          <div class="today-program-hosts" id="todayProgramHosts"></div>
        </div>
        <div class="card-icon">📻</div>
      </div>

      <div class="weather-widget">
        <div class="weather-left">
          <div class="weather-main">
            Actualmente hace <span id="weatherTemp">--°</span>
            <span class="dot">·</span>
            <span id="weatherText">Cargando clima...</span>
          </div>
          <div class="weather-location">Santa Sylvina, Chaco</div>
        </div>

        <div class="weather-right">
          <img id="weatherIcon" src="https://openweathermap.org/img/wn/02d@2x.png" alt="Clima actual" />
        </div>
      </div>

      <div class="hint" id="installHint"></div>
    </div>
  </div>

  <script>
    const radio = document.getElementById("radio");
    const statusEl = document.getElementById("status");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const installBtn = document.getElementById("installBtn");
    const installHint = document.getElementById("installHint");
    const todayProgramWidget = document.getElementById("todayProgramWidget");
    const todayProgramTitle = document.getElementById("todayProgramTitle");
    const todayProgramTime = document.getElementById("todayProgramTime");
    const todayProgramHosts = document.getElementById("todayProgramHosts");
    const notifyBtn = document.getElementById("notifyBtn");
    const liveBadge = document.getElementById("liveBadge");

    const STREAM_STATS_URL = "https://radios.solumedia.com:6322/status-json.xsl";
    const STREAM_MOUNT = "/stream";
    const APP_TIMEZONE = "America/Argentina/Buenos_Aires";

    let deferredPrompt = null;
    let lastProgramNotificationKey = "";

    const PROGRAMACION = [
      {
        days: [1, 3],
        start: "21:00",
        end: "23:00",
        title: "Zona Fe",
        hosts: "Juan Alarcon y Mauro Polini"
      },
      {
        days: [5],
        start: "20:00",
        end: "22:00",
        title: "Conectados",
        hosts: "FM Apocalipsis 100.7"
      },
      {
        days: [6],
        start: "08:00",
        end: "10:00",
        title: "Zona Fe",
        hosts: "Juan Alarcon y Mauro Polini"
      },
      {
        days: [0],
        start: "09:00",
        end: "11:00",
        title: "Conectados",
        hosts: "José Crespin y Andrea Jimenez"
      }
    ];

    function isIOS() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isInStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function activarEstadoPlay() {
      playBtn.classList.add("playing");
    }

    function desactivarEstadoPlay() {
      playBtn.classList.remove("playing");
    }

    function activarEnVivo() {
      liveBadge.classList.add("active");
    }

    function desactivarEnVivo() {
      liveBadge.classList.remove("active");
    }

    function timeToMinutes(time) {
      const [hours, minutes] = time.split(":").map(Number);
      return (hours * 60) + minutes;
    }

    function getNowParts() {
      const now = new Date();
      const weekdayName = new Intl.DateTimeFormat("es-AR", {
        timeZone: APP_TIMEZONE,
        weekday: "long"
      }).format(now).toLowerCase();

      const timeString = new Intl.DateTimeFormat("en-GB", {
        timeZone: APP_TIMEZONE,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now);

      const dayMap = {
        domingo: 0,
        lunes: 1,
        martes: 2,
        miércoles: 3,
        miercoles: 3,
        jueves: 4,
        viernes: 5,
        sábado: 6,
        sabado: 6
      };

      return {
        day: dayMap[weekdayName],
        time: timeString
      };
    }

    function getTodayPrograms() {
      const { day } = getNowParts();
      return PROGRAMACION.filter(programa => programa.days.includes(day));
    }

    function getCurrentProgram() {
      const { day, time } = getNowParts();
      const nowMinutes = timeToMinutes(time);

      return PROGRAMACION.find(programa => {
        if (!programa.days.includes(day)) return false;
        const startMinutes = timeToMinutes(programa.start);
        const endMinutes = timeToMinutes(programa.end);
        return nowMinutes >= startMinutes && nowMinutes < endMinutes;
      }) || null;
    }

    function renderProgramacionDeHoy() {
      const programs = getTodayPrograms();

      if (!programs.length) {
        todayProgramWidget.hidden = true;
        return;
      }

      const currentProgram = getCurrentProgram();
      const principal = currentProgram || programs[0];

      todayProgramWidget.hidden = false;
      todayProgramTitle.textContent = `${principal.title} | Hoy`;
      todayProgramTime.textContent = `${principal.start} a ${principal.end} hs`;
      todayProgramHosts.textContent = principal.hosts || "FM Apocalipsis 100.7";
    }

    async function cargarClima() {
      try {
        const lat = -27.83;
        const lon = -61.13;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.current) return;

        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;

        document.getElementById("weatherTemp").textContent = temp + "°";
        document.getElementById("weatherText").textContent = traducirClima(code);
        document.getElementById("weatherIcon").src = iconoClima(code);
      } catch (error) {
        document.getElementById("weatherText").textContent = "No disponible";
      }
    }

    function traducirClima(code) {
      const clima = {
        0: "Despejado",
        1: "Mayormente despejado",
        2: "Parcialmente nublado",
        3: "Nublado",
        45: "Niebla",
        48: "Niebla",
        51: "Llovizna leve",
        53: "Llovizna",
        55: "Llovizna fuerte",
        61: "Lluvia",
        63: "Lluvia moderada",
        65: "Lluvia fuerte",
        80: "Chubascos",
        81: "Chubascos moderados",
        82: "Chubascos fuertes",
        95: "Tormenta"
      };

      return clima[code] || "Clima actualizado";
    }

    function iconoClima(code) {
      if (code === 0) return "https://openweathermap.org/img/wn/01d@2x.png";
      if (code <= 2) return "https://openweathermap.org/img/wn/02d@2x.png";
      if (code === 3) return "https://openweathermap.org/img/wn/03d@2x.png";
      if (code >= 61) return "https://openweathermap.org/img/wn/09d@2x.png";
      return "https://openweathermap.org/img/wn/02d@2x.png";
    }

    function normalizeSourceData(sourceData) {
      if (!sourceData) return [];
      return Array.isArray(sourceData) ? sourceData : [sourceData];
    }

    function pickMainSource(sources) {
      const exact = sources.find(source =>
        source.listenurl && source.listenurl.includes(STREAM_MOUNT)
      );
      if (exact) return exact;
      return sources[0] || null;
    }

    async function cargarStatsRadio() {
      const currentProgram = getCurrentProgram();

      try {
        const res = await fetch(STREAM_STATS_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("No se pudo cargar stats");

        const data = await res.json();
        const sources = normalizeSourceData(data?.icestats?.source);
        const source = pickMainSource(sources);

        if (!source) {
          if (!radio.paused) {
            statusEl.textContent = currentProgram
              ? currentProgram.title
              : "FM Apocalipsis en vivo";
          }
          return;
        }

        const nowPlaying =
          source.title ||
          source.server_description ||
          source.server_name ||
          "";

        if (!radio.paused) {
          statusEl.textContent =
            nowPlaying && nowPlaying.trim() !== ""
              ? nowPlaying
              : (currentProgram ? currentProgram.title : "FM Apocalipsis en vivo");
        }
      } catch (error) {
        if (!radio.paused) {
          statusEl.textContent = currentProgram
            ? currentProgram.title
            : "FM Apocalipsis en vivo";
        }
      }
    }

    function maybeNotifyProgramStart() {
      const currentProgram = getCurrentProgram();
      if (!currentProgram) return;
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;

      const todayKey = `${getNowParts().day}-${currentProgram.start}-${currentProgram.title}`;
      if (lastProgramNotificationKey === todayKey) return;

      new Notification("FM Apocalipsis 100.7", {
        body: `${currentProgram.title} ya está en vivo${currentProgram.hosts ? " · " + currentProgram.hosts : ""}`
      });

      lastProgramNotificationKey = todayKey;
    }

    function initNotificationButton() {
      if (!("Notification" in window)) {
        notifyBtn.hidden = true;
        return;
      }

      if (Notification.permission === "granted") {
        notifyBtn.textContent = "🔔 Avisos activados";
        return;
      }

      if (Notification.permission === "denied") {
        notifyBtn.textContent = "🔕 Avisos bloqueados";
        return;
      }

      notifyBtn.addEventListener("click", async () => {
        try {
          const permission = await Notification.requestPermission();
          if (permission === "granted") {
            notifyBtn.textContent = "🔔 Avisos activados";
            maybeNotifyProgramStart();
          } else if (permission === "denied") {
            notifyBtn.textContent = "🔕 Avisos bloqueados";
          }
        } catch (e) {}
      }, { once: true });
    }

    playBtn.addEventListener("click", async () => {
      try {
        statusEl.textContent = "Conectando...";
        await radio.play();
      } catch (err) {
        statusEl.textContent = "No se pudo reproducir. Toca Play otra vez.";
        desactivarEstadoPlay();
        desactivarEnVivo();
      }
    });

    pauseBtn.addEventListener("click", () => {
      radio.pause();
      statusEl.textContent = "Pausado";
      desactivarEstadoPlay();
      desactivarEnVivo();
    });

    radio.addEventListener("waiting", () => {
      statusEl.textContent = "Conectando...";
    });

    radio.addEventListener("playing", async () => {
      activarEstadoPlay();
      activarEnVivo();
      await cargarStatsRadio();
    });

    radio.addEventListener("pause", () => {
      if (radio.paused) {
        statusEl.textContent = "Pausado";
        desactivarEstadoPlay();
        desactivarEnVivo();
      }
    });

    radio.addEventListener("ended", () => {
      desactivarEstadoPlay();
      desactivarEnVivo();
      statusEl.textContent = "Finalizado";
    });

    radio.addEventListener("error", () => {
      statusEl.textContent = "Error al cargar el audio";
      desactivarEstadoPlay();
      desactivarEnVivo();
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;
      installHint.textContent = "";
    });

    installBtn.addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        installBtn.hidden = true;
        return;
      }

      if (isIOS() && !isInStandaloneMode()) {
        installHint.textContent = "En iPhone: Compartir → Añadir a pantalla de inicio";
        return;
      }

      installHint.textContent = "Si no aparece el aviso, usa el menú del navegador para instalar.";
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
      installHint.textContent = "App instalada correctamente";
    });

    if (isIOS() && !isInStandaloneMode()) {
      installBtn.hidden = false;
      installHint.textContent = "En iPhone se instala desde Compartir → Añadir a pantalla de inicio";
    }

    cargarClima();
    renderProgramacionDeHoy();
    initNotificationButton();
    maybeNotifyProgramStart();

    setInterval(cargarClima, 600000);
    setInterval(() => {
      if (!radio.paused) {
        cargarStatsRadio();
      }
    }, 30000);
    setInterval(() => {
      renderProgramacionDeHoy();
      maybeNotifyProgramStart();
    }, 60000);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
