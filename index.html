<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="FM Apocalipsis 100.7 - Radio en vivo" />
    <title>FM Apocalipsis 100.7</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="logo.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class'
      };
    </script>

    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0a0a0a;
      }

      .pb-safe {
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
      }

      .animate-spin-slow {
        animation: spin 2s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
      window.react = window.React;
    </script>
    <script src="https://unpkg.com/lucide-react@0.468.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="env,react">
      const { useState, useRef, useEffect, useMemo } = React;
      const {
        Play,
        Pause,
        Radio,
        Volume2,
        VolumeX,
        MessageCircle,
        Minus,
        CalendarDays,
        MonitorPlay,
        Youtube,
        Facebook,
        Users,
        Sun,
        Moon,
        Clock,
        RefreshCw,
        Bell,
        BellRing,
        Share2,
        Download
      } = LucideReact;

      const TikTokIcon = ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z" />
        </svg>
      );

      function App() {
        const [isPlaying, setIsPlaying] = useState(false);
        const [activeTab, setActiveTab] = useState('home');
        const [volume, setVolume] = useState(80);
        const [isMuted, setIsMuted] = useState(false);
        const [selectedDay, setSelectedDay] = useState('L');
        const [nowPlaying, setNowPlaying] = useState('');
        const [listeners, setListeners] = useState(0);
        const [streamError, setStreamError] = useState(false);

        const [scheduleData, setScheduleData] = useState({
          'L': [], 'M': [], 'X': [], 'J': [], 'V': [], 'S': [], 'D': []
        });
        const [promoGifs, setPromoGifs] = useState([]);

        const [currentAdIndex, setCurrentAdIndex] = useState(0);
        const [notificationsEnabled, setNotificationsEnabled] = useState({});
        const [toastMsg, setToastMsg] = useState(null);
        const [themeMode, setThemeMode] = useState('auto');
        const [isDark, setIsDark] = useState(true);
        const [currentProgram, setCurrentProgram] = useState(null);

        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [isInstallable, setIsInstallable] = useState(false);

        const audioRef = useRef(null);
        const streamUrl = "https://radios.solumedia.com:6322/stream";
        const googleSheetsCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQP-N3so4cbqVC-4RfmlqZlRZapDugeYTSfrAjDKj8UghSOuqrvipAXXTQBCV5WEIoSajBhLoYfk5cO/pub?output=csv";

        useEffect(() => {
          const handleBeforeInstallPrompt = (e) => {
            e.preventDefault();
            setDeferredPrompt(e);
            setIsInstallable(true);
          };

          window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);

          return () => {
            window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
          };
        }, []);

        const handleInstallClick = async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
              console.log('App instalada');
              setIsInstallable(false);
            }
            setDeferredPrompt(null);
          }
        };

        const handleShare = async () => {
          const shareData = {
            title: 'FM Apocalipsis 100.7',
            text: '¡Escucha nuestra radio en vivo y mira nuestra programación!',
            url: window.location.href
          };

          if (navigator.share) {
            try {
              await navigator.share(shareData);
            } catch (err) {
              console.log('Error al compartir', err);
            }
          } else {
            try {
              const textArea = document.createElement("textarea");
              textArea.value = window.location.href;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand('copy');
              document.body.removeChild(textArea);
              showToast('¡Enlace copiado para compartir!');
            } catch (err) {
              console.error('Error al copiar', err);
            }
          }
        };

        useEffect(() => {
          const fetchSchedule = async () => {
            try {
              const response = await fetch(googleSheetsCsvUrl);
              const text = await response.text();

              const rows = [];
              let quote = false;
              let row = 0, col = 0;
              for (let c = 0; c < text.length; c++) {
                let cc = text[c], nc = text[c + 1];
                rows[row] = rows[row] || [];
                rows[row][col] = rows[row][col] || '';
                if (cc === '"' && quote && nc === '"') {
                  rows[row][col] += cc;
                  ++c;
                  continue;
                }
                if (cc === '"') {
                  quote = !quote;
                  continue;
                }
                if (cc === ',' && !quote) {
                  ++col;
                  continue;
                }
                if (cc === '\r' && nc === '\n' && !quote) {
                  ++row;
                  col = 0;
                  ++c;
                  continue;
                }
                if (cc === '\n' && !quote) {
                  ++row;
                  col = 0;
                  continue;
                }
                if (cc === '\r' && !quote) {
                  ++row;
                  col = 0;
                  continue;
                }
                rows[row][col] += cc;
              }

              const newSchedule = { 'L': [], 'M': [], 'X': [], 'J': [], 'V': [], 'S': [], 'D': [] };
              const newGifs = [];

              for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r.length >= 4 && r[0]) {
                  const dia = r[0].trim().toUpperCase();

                  if (dia === 'IMG') {
                    const imgUrl = r[3] ? r[3].trim() : '';
                    if (imgUrl && !newGifs.includes(imgUrl)) newGifs.push(imgUrl);
                    continue;
                  }

                  if (r.length >= 4) {
                    const title = r[3] ? r[3].trim() : '';

                    if (title !== '') {
                      const isLive = r.length >= 6 && r[5] ? r[5].trim().toUpperCase() === 'SI' : false;
                      const imageUrl = r.length >= 7 && r[6] ? r[6].trim() : null;

                      if (imageUrl && !newGifs.includes(imageUrl)) {
                        newGifs.push(imageUrl);
                      }

                      if (newSchedule[dia]) {
                        newSchedule[dia].push({
                          start: r[1] ? r[1].trim() : '',
                          end: r[2] ? r[2].trim() : '',
                          title: title,
                          hosts: r.length >= 5 && r[4] ? r[4].trim() : '',
                          isLive: isLive,
                          image: imageUrl
                        });
                      }
                    }
                  }
                }
              }

              setScheduleData(newSchedule);
              if (newGifs.length > 0) {
                setPromoGifs(newGifs);
              }
            } catch (error) {
              console.error("Error al cargar datos:", error);
            }
          };

          fetchSchedule();
          const interval = setInterval(fetchSchedule, 30000);
          return () => clearInterval(interval);
        }, []);

        useEffect(() => {
          const checkCurrentProgram = () => {
            const now = new Date();
            const dayIndex = now.getDay();
            const daysMap = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
            const todayLetter = daysMap[dayIndex];

            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();
            const timeNumber = currentHour + (currentMinute / 60);

            const todaysPrograms = scheduleData[todayLetter];
            let activeProgram = null;

            if (todaysPrograms && todaysPrograms.length > 0) {
              for (let i = 0; i < todaysPrograms.length; i++) {
                const prog = todaysPrograms[i];
                if (!prog.start || !prog.end) continue;

                const startParts = prog.start.split(':');
                const startNum = parseInt(startParts[0]) + (parseInt(startParts[1] || 0) / 60);

                const endParts = prog.end.split(':');
                const endNum = parseInt(endParts[0]) + (parseInt(endParts[1] || 0) / 60);

                if (startNum > endNum) {
                  if (timeNumber >= startNum || timeNumber < endNum) {
                    activeProgram = prog;
                    break;
                  }
                } else {
                  if (timeNumber >= startNum && timeNumber < endNum) {
                    activeProgram = prog;
                    break;
                  }
                }
              }
            }
            setCurrentProgram(activeProgram);
          };

          checkCurrentProgram();
          const timerId = setInterval(checkCurrentProgram, 60000);
          return () => clearInterval(timerId);
        }, [scheduleData]);

        useEffect(() => {
          const dayIndex = new Date().getDay();
          const daysMap = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
          setSelectedDay(daysMap[dayIndex]);
        }, []);

        const displayGifs = useMemo(() => {
          let gifs = [...promoGifs];
          if (currentProgram && currentProgram.image) {
            if (!gifs.includes(currentProgram.image)) {
              gifs = [currentProgram.image, ...gifs];
            }
          }
          return gifs;
        }, [promoGifs, currentProgram]);

        const safeAdIndex = displayGifs.length > 0 ? currentAdIndex % displayGifs.length : 0;
        const currentDisplayedImage = displayGifs[safeAdIndex];

        const isShowingLivePromo = currentProgram && currentProgram.image && currentDisplayedImage === currentProgram.image;

        const syncToLive = () => {
          if (audioRef.current) {
            setIsPlaying(false);
            setStreamError(false);
            audioRef.current.src = streamUrl;
            audioRef.current.load();
            audioRef.current.play()
              .then(() => {
                setIsPlaying(true);
                setupMediaSession();
              })
              .catch((e) => {
                console.log("Error de autoplay", e);
                if (e.name !== 'AbortError') {
                  setStreamError(true);
                  setIsPlaying(false);
                }
              });
          }
        };

        const togglePlay = () => {
          if (isPlaying) {
            if (audioRef.current) audioRef.current.pause();
            setIsPlaying(false);
          } else {
            syncToLive();
          }
        };

        const toggleMute = () => {
          setIsMuted(!isMuted);
          if (audioRef.current) audioRef.current.muted = !isMuted;
        };

        const handleVolumeChange = (e) => {
          const newVolume = e.target.value;
          setVolume(newVolume);
          if (newVolume > 0 && isMuted) setIsMuted(false);
          if (audioRef.current) audioRef.current.volume = newVolume / 100;
        };

        const setupMediaSession = () => {
          if ('mediaSession' in navigator) {
            const artwork = currentDisplayedImage ? [{ src: currentDisplayedImage, sizes: '512x512', type: 'image/jpeg' }] : [];
            navigator.mediaSession.metadata = new MediaMetadata({
              title: currentProgram ? currentProgram.title : (nowPlaying ? nowPlaying : 'FM Apocalipsis 100.7'),
              artist: currentProgram ? currentProgram.hosts : 'FM Apocalipsis 100.7',
              album: 'Radio en Vivo',
              artwork: artwork
            });
            navigator.mediaSession.setActionHandler('play', syncToLive);
            navigator.mediaSession.setActionHandler('pause', () => {
              if (audioRef.current) audioRef.current.pause();
              setIsPlaying(false);
            });
          }
        };

        useEffect(() => {
          if (isPlaying) setupMediaSession();
        }, [nowPlaying, currentDisplayedImage, isPlaying, currentProgram]);

        useEffect(() => {
          if (displayGifs.length <= 1) return;
          const adInterval = setInterval(() => {
            setCurrentAdIndex((prev) => (prev + 1) % displayGifs.length);
          }, 6000);
          return () => clearInterval(adInterval);
        }, [displayGifs.length]);

        const toggleNotification = (programTitle) => {
          if ("Notification" in window) {
            Notification.requestPermission().then((permission) => {
              if (permission === "granted") {
                const isEnabled = !notificationsEnabled[programTitle];
                setNotificationsEnabled((prev) => ({ ...prev, [programTitle]: isEnabled }));
                showToast(isEnabled ? `Recordatorio activado: ${programTitle}` : `Recordatorio desactivado`);
              } else {
                showToast("Permite las notificaciones en tu navegador.");
              }
            });
          } else {
            showToast("Tu dispositivo no soporta notificaciones web.");
          }
        };

        const showToast = (msg) => {
          setToastMsg(msg);
          setTimeout(() => setToastMsg(null), 3000);
        };

        const toggleThemeMode = () => {
          if (themeMode === 'auto') setThemeMode('light');
          else if (themeMode === 'light') setThemeMode('dark');
          else setThemeMode('auto');
        };

        useEffect(() => {
          const applyTheme = () => {
            if (themeMode === 'dark') setIsDark(true);
            else if (themeMode === 'light') setIsDark(false);
            else {
              const hour = new Date().getHours();
              setIsDark(hour >= 18 || hour < 6);
            }
          };
          applyTheme();
          const interval = setInterval(applyTheme, 60000);
          return () => clearInterval(interval);
        }, [themeMode]);

        useEffect(() => {
          const fetchMetadata = async () => {
            try {
              const response = await fetch('https://radios.solumedia.com:6322/stats?sid=1&json=1');
              if (response.ok) {
                const data = await response.json();
                setNowPlaying(data.songtitle || '');
                setListeners(data.currentlisteners || 0);
              }
            } catch (error) {
              setNowPlaying('');
            }
          };
          fetchMetadata();
          const interval = setInterval(fetchMetadata, 15000);
          return () => clearInterval(interval);
        }, []);

        const weekDays = [
          { id: 'L', label: 'L', name: 'Lunes' },
          { id: 'M', label: 'M', name: 'Martes' },
          { id: 'X', label: 'MI', name: 'Miércoles' },
          { id: 'J', label: 'J', name: 'Jueves' },
          { id: 'V', label: 'V', name: 'Viernes' },
          { id: 'S', label: 'S', name: 'Sábado' },
          { id: 'D', label: 'D', name: 'Domingo' }
        ];

        return (
          <div className={`flex justify-center items-center h-[100dvh] w-full font-sans transition-colors duration-500 overflow-hidden ${isDark ? 'dark bg-[#0a0a0a] selection:bg-amber-500/30' : 'bg-gray-200 selection:bg-blue-600/30'}`}>
            <div className="w-full h-full sm:max-w-md bg-white dark:bg-slate-950 sm:h-[90vh] sm:rounded-[2.5rem] shadow-none sm:shadow-2xl dark:shadow-none sm:dark:shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden relative flex flex-col border-0 sm:border border-gray-300 dark:border-slate-800/60 ring-0 sm:ring-1 ring-black/5 dark:ring-white/5 transition-colors duration-500">
              <div className={`absolute top-0 inset-x-0 h-96 blur-[100px] rounded-full pointer-events-none transition-colors duration-1000 ${isDark ? 'bg-amber-500/10' : 'bg-blue-500/10'}`} />

              <audio
                ref={audioRef}
                src={streamUrl}
                playsInline
                onError={() => {
                  setStreamError(true);
                  setIsPlaying(false);
                }}
              />

              <div className={`absolute top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full text-xs font-medium shadow-lg transition-all duration-300 w-max max-w-[90%] text-center ${toastMsg ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4 pointer-events-none'} ${isDark ? 'bg-amber-500 text-slate-950' : 'bg-blue-600 text-white'}`}>
                {toastMsg}
              </div>

              <div className="pt-12 sm:pt-8 pb-4 px-6 relative z-10 flex justify-between items-center backdrop-blur-sm">
                <div className="flex items-center gap-3 flex-1 overflow-hidden pr-2">
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center shadow-lg shrink-0 transition-colors ${isDark ? 'bg-gradient-to-tr from-amber-600 to-amber-300 shadow-amber-500/20' : 'bg-gradient-to-tr from-blue-600 to-blue-400 shadow-blue-500/20'}`}>
                    <Radio size={16} className={isDark ? 'text-slate-950' : 'text-white'} strokeWidth={2.5} />
                  </div>
                  <div className="overflow-hidden flex flex-col w-full">
                    <div className="flex items-baseline truncate">
                      <h1 className="text-base font-bold tracking-wide text-blue-600 dark:text-blue-400 truncate transition-colors">
                        FM Apocalipsis 100.7
                      </h1>
                    </div>

                    {currentProgram ? (
                      <div className="flex flex-col mt-0.5">
                        <span className="text-[10px] font-bold uppercase tracking-wider text-red-500 flex items-center gap-1">
                          <span className="relative flex h-1.5 w-1.5 shrink-0">
                            <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-red-400"></span>
                            <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500"></span>
                          </span>
                          <span className="truncate">En Vivo: {currentProgram.title}</span>
                        </span>
                      </div>
                    ) : (
                      <p className="text-[11px] text-gray-500 dark:text-slate-400 truncate mt-0.5 transition-colors">
                        La voz que viene de lo alto
                      </p>
                    )}
                  </div>
                </div>

                <div className="flex gap-1 shrink-0 items-center">
                  {isInstallable && (
                    <button
                      onClick={handleInstallClick}
                      className="flex items-center gap-1.5 px-3 py-1.5 bg-red-600 hover:bg-red-700 text-white text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-full transition-all shadow-lg active:scale-95"
                    >
                      <Download size={14} />
                      <span>Instalar</span>
                    </button>
                  )}

                  <button
                    onClick={handleShare}
                    title="Compartir App"
                    className="p-2 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100 transition-colors rounded-full hover:bg-gray-100 dark:hover:bg-slate-800/50"
                  >
                    <Share2 size={18} strokeWidth={2} />
                  </button>

                  <button
                    onClick={toggleThemeMode}
                    title="Cambiar Apariencia"
                    className="p-2 text-gray-500 dark:text-slate-400 hover:text-gray-900 dark:hover:text-slate-100 transition-colors rounded-full hover:bg-gray-100 dark:hover:bg-slate-800/50"
                  >
                    {themeMode === 'auto' && <Clock size={20} strokeWidth={1.5} />}
                    {themeMode === 'dark' && <Moon size={20} strokeWidth={1.5} />}
                    {themeMode === 'light' && <Sun size={20} strokeWidth={1.5} />}
                  </button>
                </div>
              </div>

              <div className="flex-1 overflow-hidden pb-24 relative z-10 flex flex-col">
                {activeTab === 'home' && (
                  <div className="flex-1 flex flex-col items-center justify-evenly px-6 pt-2 pb-4 h-full">
                    <div className="w-full aspect-square max-w-[280px] sm:max-w-[260px] relative group mt-4">
                      <div className={`absolute inset-0 rounded-3xl blur-2xl transition-opacity duration-1000 ${isDark ? 'bg-gradient-to-tr from-amber-600/40 to-purple-600/40' : 'bg-gradient-to-tr from-blue-400/40 to-indigo-400/40'} ${isPlaying ? 'opacity-100' : 'opacity-40'}`}></div>
                      <div className="w-full h-full rounded-3xl overflow-hidden relative shadow-2xl ring-1 ring-black/5 dark:ring-white/10 bg-slate-200 dark:bg-slate-900 flex items-center justify-center">
                        {isShowingLivePromo && (
                          <div className="absolute top-3 right-3 z-20 backdrop-blur-md px-2 py-1 rounded-md text-[8px] font-bold tracking-wider text-white border border-white/10 uppercase transition-colors duration-500 bg-red-600/80 shadow-[0_0_10px_rgba(220,38,38,0.5)]">
                            En Vivo
                          </div>
                        )}

                        {displayGifs.length > 0 ? (
                          displayGifs.map((gifUrl, index) => (
                            <img
                              key={index}
                              src={gifUrl}
                              alt="Visual"
                              onError={(e) => {
                                e.target.style.display = 'none';
                              }}
                              className={`absolute w-full h-full object-cover transition-all duration-1000 ease-in-out ${
                                safeAdIndex === index ? 'opacity-100 scale-100' : 'opacity-0 scale-105'
                              }`}
                            />
                          ))
                        ) : (
                          <div className="text-gray-400 flex flex-col items-center opacity-50">
                            <Radio size={48} />
                          </div>
                        )}

                        <div className={`absolute inset-0 transition-colors ${isDark ? 'bg-gradient-to-t from-slate-950/90 via-transparent to-transparent' : 'bg-gradient-to-t from-black/60 via-transparent to-transparent'}`}></div>
                      </div>
                    </div>

                    <div className="w-full px-4 text-center mt-2 flex-1 flex flex-col justify-end">
                      {streamError ? (
                        <div className="marquee-container min-h-[56px]">
                          <div className="marquee-text text-red-500 font-bold text-[11px] sm:text-xs tracking-widest uppercase">
                            ⚠️ Radio apagada por inclemencias del tiempo o mantenimiento. Disculpe, intente más tarde.
                          </div>
                        </div>
                      ) : (
                        <h2 className={`text-lg sm:text-xl font-bold tracking-tight leading-tight line-clamp-2 min-h-[56px] flex flex-col items-center justify-center transition-colors ${isDark ? 'text-slate-100' : 'text-gray-900'}`}>
                          {currentProgram ? currentProgram.title : nowPlaying}
                          {currentProgram && (
                            <span className="text-sm font-normal text-gray-500 dark:text-slate-400 mt-1">
                              Con {currentProgram.hosts}
                            </span>
                          )}
                        </h2>
                      )}

                      <div className={`flex items-center justify-center gap-[5px] h-8 mt-2 transition-all duration-700 ease-in-out ${isPlaying ? 'opacity-100 scale-100' : 'opacity-0 scale-90 pointer-events-none'}`}>
                        {[0.4, 0.1, 0.6, 0.0, 0.5, 0.2, 0.7, 0.3, 0.5].map((delay, i) => (
                          <div
                            key={i}
                            className={`w-[5px] rounded-full transition-colors ${isDark ? 'bg-amber-500' : 'bg-blue-500'}`}
                            style={{
                              height: isPlaying ? '100%' : '4px',
                              animation: isPlaying ? `eqBounce 1.2s ease-in-out infinite ${delay}s` : 'none',
                              boxShadow: isPlaying ? `0 0 8px ${isDark ? 'rgba(245, 158, 11, 0.6)' : 'rgba(59, 130, 246, 0.6)'}` : 'none'
                            }}
                          ></div>
                        ))}
                      </div>

                      <div className="mt-4">
                        <div className="h-1 w-full bg-gray-300 dark:bg-slate-800 rounded-full overflow-hidden transition-colors">
                          <div className={`h-full w-1/3 relative transition-colors duration-500 ${isPlaying ? (isDark ? 'bg-amber-500' : 'bg-blue-600') : 'bg-gray-400 dark:bg-slate-700'}`}>
                            <div className={`absolute right-0 top-0 bottom-0 w-2 bg-white blur-[2px] transition-opacity duration-500 ${isPlaying ? 'opacity-100' : 'opacity-0'}`}></div>
                          </div>
                        </div>

                        <div className="flex justify-between items-center mt-3">
                          <button
                            onClick={syncToLive}
                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-all duration-300 shadow-sm active:scale-95 ${
                              isPlaying
                                ? 'bg-red-100 dark:bg-red-500/10 text-red-600 dark:text-red-500 hover:bg-red-200 dark:hover:bg-red-500/20'
                                : 'bg-gray-200 dark:bg-slate-800 text-gray-600 dark:text-slate-400 hover:bg-gray-300 dark:hover:bg-slate-700'
                            }`}
                          >
                            <span className="relative flex h-2 w-2">
                              {isPlaying && <span className="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-red-400 dark:bg-red-500"></span>}
                              <span className={`relative inline-flex rounded-full h-2 w-2 transition-colors duration-500 ${isPlaying ? 'bg-red-600 dark:bg-red-500' : 'bg-gray-500 dark:bg-slate-500'}`}></span>
                            </span>
                            <span className="text-[10px] font-bold tracking-wider">EN VIVO</span>
                            <RefreshCw size={10} className={isPlaying ? 'animate-spin-slow' : ''} />
                          </button>

                          <div className="flex items-center gap-3">
                            <span className={`flex items-center gap-1 text-[10px] font-medium transition-colors duration-500 ${isPlaying ? 'text-gray-600 dark:text-slate-400' : 'text-gray-400 dark:text-slate-600'}`}>
                              <Users size={12} /> {listeners}
                            </span>
                            <span className={`text-[10px] font-medium tracking-wider transition-colors duration-500 ${isPlaying ? (isDark ? 'text-amber-500 animate-pulse' : 'text-blue-600 animate-pulse') : 'text-gray-500 dark:text-slate-500'}`}>
                              {isPlaying ? 'SONANDO' : 'PAUSADO'}
                            </span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="flex items-center justify-center mt-6 sm:mt-4 mb-2">
                      <button
                        onClick={togglePlay}
                        className={`w-20 h-20 sm:w-16 sm:h-16 flex items-center justify-center rounded-full hover:scale-105 active:scale-95 transition-all shadow-xl ${isDark ? 'bg-slate-100 text-slate-950 shadow-[0_0_30px_rgba(255,255,255,0.1)]' : 'bg-blue-600 text-white shadow-[0_0_20px_rgba(37,99,235,0.3)]'}`}
                      >
                        {isPlaying ? (
                          <Pause size={32} className={isDark ? 'fill-slate-950' : 'fill-white'} strokeWidth={1} />
                        ) : (
                          <Play size={36} className={`ml-2 ${isDark ? 'fill-slate-950' : 'fill-white'}`} strokeWidth={1} />
                        )}
                      </button>
                    </div>

                    <div className="flex items-center w-full max-w-[280px] gap-4 text-gray-500 dark:text-slate-500 mt-2 mb-4">
                      <button onClick={toggleMute} className="hover:text-gray-800 dark:hover:text-slate-300 transition-colors">
                        {isMuted || volume == 0 ? <VolumeX size={18} strokeWidth={1.5} /> : <Volume2 size={18} strokeWidth={1.5} />}
                      </button>
                      <div className="relative w-full h-1 bg-gray-300 dark:bg-slate-800 rounded-full flex items-center group">
                        <input
                          type="range"
                          min="0"
                          max="100"
                          value={isMuted ? 0 : volume}
                          onChange={handleVolumeChange}
                          className="absolute z-10 w-full h-full opacity-0 cursor-pointer"
                        />
                        <div
                          className={`h-full rounded-full pointer-events-none transition-colors ${isDark ? 'bg-slate-400 group-hover:bg-amber-400' : 'bg-gray-500 group-hover:bg-blue-500'}`}
                          style={{ width: `${isMuted ? 0 : volume}%` }}
                        ></div>
                        <div className="absolute h-3 w-3 bg-white rounded-full shadow-md pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity" style={{ left: `calc(${isMuted ? 0 : volume}% - 6px)` }}></div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'schedule' && (
                  <div className="flex-1 flex flex-col px-6 pt-2 pb-2 h-full">
                    <div className="mb-4">
                      <h2 className="text-3xl font-light text-gray-900 dark:text-slate-100 mb-1 transition-colors">Programación</h2>
                      <p className="text-gray-500 dark:text-slate-500 text-sm transition-colors">Encuentra tus programas y activa recordatorios.</p>
                    </div>

                    <div className="flex justify-between items-center mb-4 bg-gray-100 dark:bg-slate-900/50 p-1.5 rounded-2xl border border-gray-200 dark:border-slate-800 transition-colors">
                      {weekDays.map((day) => (
                        <button
                          key={day.id}
                          onClick={() => setSelectedDay(day.id)}
                          className={`flex-1 py-2 rounded-xl text-xs font-medium transition-all ${
                            selectedDay === day.id
                              ? (isDark ? 'bg-amber-500 text-slate-950 shadow-[0_0_15px_rgba(245,158,11,0.3)]' : 'bg-blue-600 text-white shadow-md')
                              : 'text-gray-500 dark:text-slate-400 hover:text-gray-800 dark:hover:text-slate-200 hover:bg-gray-200 dark:hover:bg-slate-800/50'
                          }`}
                        >
                          {day.label}
                        </button>
                      ))}
                    </div>

                    <div className="flex-1 overflow-y-auto pr-1 custom-scrollbar pb-4">
                      <div className="block space-y-3">
                        {scheduleData[selectedDay] && scheduleData[selectedDay].length > 0 ? scheduleData[selectedDay].map((program, idx) => {
                          const isActuallyLiveRightNow = currentProgram && currentProgram.title === program.title;

                          return (
                            <div key={idx} className={`relative p-3.5 sm:p-4 rounded-2xl border backdrop-blur-md transition-all flex items-center w-full h-fit min-h-[70px] ${
                              isActuallyLiveRightNow
                                ? (isDark ? 'bg-amber-500/10 border-amber-500/30 shadow-[0_0_20px_rgba(245,158,11,0.1)]' : 'bg-blue-50 border-blue-200 shadow-sm')
                                : 'bg-gray-50 dark:bg-slate-900/50 border-gray-200 dark:border-slate-800 hover:border-gray-300 dark:hover:border-slate-700'
                            }`}>
                              <div className="flex gap-4 items-center w-full">
                                <div className="flex flex-col items-center justify-center min-w-[50px]">
                                  <span className={`text-sm font-medium ${isActuallyLiveRightNow ? (isDark ? 'text-amber-400' : 'text-blue-600') : 'text-gray-700 dark:text-slate-300'}`}>{program.start}</span>
                                  <Minus size={12} className="text-gray-400 dark:text-slate-600 my-0.5" />
                                  <span className={`text-sm font-medium ${isActuallyLiveRightNow ? (isDark ? 'text-amber-400/70' : 'text-blue-600/70') : 'text-gray-500 dark:text-slate-500'}`}>{program.end}</span>
                                </div>

                                <div className="w-px h-10 bg-gray-300 dark:bg-slate-800"></div>

                                {program.image && (
                                  <div className="shrink-0">
                                    <img
                                      src={program.image}
                                      alt={program.title}
                                      onError={(e) => {
                                        e.target.style.display = 'none';
                                      }}
                                      className="w-10 h-10 rounded-lg object-cover shadow-sm ring-1 ring-black/5 dark:ring-white/10"
                                    />
                                  </div>
                                )}

                                <div className="flex-1 overflow-hidden pr-2">
                                  <h3 className={`text-sm sm:text-base font-medium flex items-center gap-2 truncate ${isActuallyLiveRightNow ? (isDark ? 'text-slate-100' : 'text-blue-900') : 'text-gray-800 dark:text-slate-300'}`}>
                                    <span className="truncate">{program.title}</span>
                                    {isActuallyLiveRightNow && (
                                      <span className="flex h-2 w-2 relative shrink-0">
                                        <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isDark ? 'bg-amber-400' : 'bg-blue-400'}`}></span>
                                        <span className={`relative inline-flex rounded-full h-2 w-2 ${isDark ? 'bg-amber-500' : 'bg-blue-600'}`}></span>
                                      </span>
                                    )}
                                  </h3>
                                  <p className="text-xs text-gray-600 dark:text-slate-400 mt-0.5 leading-snug">{program.hosts}</p>
                                </div>

                                <button
                                  onClick={() => toggleNotification(program.title)}
                                  title="Avisarme cuando empiece"
                                  className={`p-2 rounded-full transition-all shrink-0 ${
                                    notificationsEnabled[program.title]
                                      ? (isDark ? 'bg-amber-500/20 text-amber-500' : 'bg-blue-100 text-blue-600')
                                      : 'bg-transparent text-gray-400 dark:text-slate-600 hover:bg-gray-200 dark:hover:bg-slate-800'
                                  }`}
                                >
                                  {notificationsEnabled[program.title] ? <BellRing size={20} className="animate-[wiggle_1s_ease-in-out_infinite]" /> : <Bell size={20} />}
                                </button>
                              </div>
                            </div>
                          );
                        }) : (
                          <div className="flex items-center justify-center py-10 text-gray-500 dark:text-slate-500 text-sm font-medium">No hay programación cargada para este día.</div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'live' && (
                  <div className="flex-1 flex flex-col px-6 pt-2 pb-4 h-full">
                    <div className="mb-6">
                      <h2 className="text-3xl font-light text-gray-900 dark:text-slate-100 mb-1 transition-colors">Ver en Vivo</h2>
                      <p className="text-gray-500 dark:text-slate-500 text-sm transition-colors">Nuestras plataformas de transmisión</p>
                    </div>
                    <div className="flex-1 flex flex-col justify-start pt-4 gap-4 relative z-10 w-full">
                      <a href="https://www.youtube.com/@zonafe" target="_blank" rel="noopener noreferrer" className="relative overflow-hidden group bg-gray-50 dark:bg-slate-900/80 border border-gray-200 dark:border-slate-800 p-4 rounded-3xl flex items-center gap-5 hover:border-red-500/50 transition-all duration-300 shadow-sm dark:shadow-lg">
                        <div className="w-14 h-14 rounded-2xl bg-red-100 dark:bg-red-500/10 flex items-center justify-center text-red-600 dark:text-red-500 group-hover:bg-red-500 group-hover:text-white transition-colors duration-300"><Youtube size={28} strokeWidth={1.5} /></div>
                        <div className="flex-1"><h3 className="text-lg font-medium text-gray-900 dark:text-slate-100">YouTube</h3><p className="text-xs text-gray-500 dark:text-slate-400 mt-0.5">Transmisión en Alta Calidad</p></div>
                        <div className="w-2 h-2 rounded-full bg-red-500 animate-pulse mr-2 shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
                      </a>
                      <a href="https://www.facebook.com/zonafe25" target="_blank" rel="noopener noreferrer" className="relative overflow-hidden group bg-gray-50 dark:bg-slate-900/80 border border-gray-200 dark:border-slate-800 p-4 rounded-3xl flex items-center gap-5 hover:border-blue-500/50 transition-all duration-300 shadow-sm dark:shadow-lg">
                        <div className="w-14 h-14 rounded-2xl bg-blue-100 dark:bg-blue-500/10 flex items-center justify-center text-blue-600 dark:text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-colors duration-300"><Facebook size={28} strokeWidth={1.5} /></div>
                        <div className="flex-1"><h3 className="text-lg font-medium text-gray-900 dark:text-slate-100">Facebook Live</h3><p className="text-xs text-gray-500 dark:text-slate-400 mt-0.5">Interactúa con la comunidad</p></div>
                        <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse mr-2 shadow-[0_0_10px_rgba(59,130,246,0.8)]"></div>
                      </a>
                      <a href="https://tiktok.com/@tu_cuenta" target="_blank" rel="noopener noreferrer" className="relative overflow-hidden group bg-gray-50 dark:bg-slate-900/80 border border-gray-200 dark:border-slate-800 p-4 rounded-3xl flex items-center gap-5 hover:border-pink-500/50 transition-all duration-300 shadow-sm dark:shadow-lg">
                        <div className="w-14 h-14 rounded-2xl bg-gray-200 dark:bg-slate-800 flex items-center justify-center text-gray-700 dark:text-slate-300 group-hover:bg-gradient-to-tr group-hover:from-cyan-500 group-hover:to-pink-500 group-hover:text-white transition-all duration-300"><TikTokIcon size={26} /></div>
                        <div className="flex-1"><h3 className="text-lg font-medium text-gray-900 dark:text-slate-100">TikTok</h3><p className="text-xs text-gray-500 dark:text-slate-400 mt-0.5">Formato vertical en directo</p></div>
                        <div className="w-2 h-2 rounded-full bg-pink-500 animate-pulse mr-2 shadow-[0_0_10px_rgba(236,72,153,0.8)]"></div>
                      </a>
                    </div>
                  </div>
                )}
              </div>

              <div className="absolute bottom-0 w-full bg-white/90 dark:bg-slate-950/80 backdrop-blur-xl border-t border-gray-200 dark:border-slate-800/80 pb-safe pt-3 px-8 flex justify-between items-center z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] dark:shadow-[0_-10px_40px_rgba(0,0,0,0.3)] transition-colors">
                <NavButton icon={<Radio size={22} strokeWidth={1.5} />} label="Radio" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} isDark={isDark} />
                <NavButton icon={<CalendarDays size={22} strokeWidth={1.5} />} label="Programación" isActive={activeTab === 'schedule'} onClick={() => setActiveTab('schedule')} isDark={isDark} />
                <NavButton icon={<MonitorPlay size={22} strokeWidth={1.5} />} label="En Vivo" isActive={activeTab === 'live'} onClick={() => setActiveTab('live')} isDark={isDark} />
                <a href="https://chat.whatsapp.com/FQnkIaic0ZEKR5nYNmheOV?mode=gi_t" target="_blank" rel="noopener noreferrer" className="flex flex-col items-center justify-center p-2 text-gray-500 dark:text-slate-500 hover:text-green-500 dark:hover:text-green-400 transition-colors group">
                  <MessageCircle size={22} strokeWidth={1.5} className="group-hover:scale-110 transition-transform" />
                  <span className="text-[9px] mt-1.5 font-medium tracking-wide">Chat</span>
                </a>
              </div>
            </div>

            <style dangerouslySetInnerHTML={{ __html: `
              .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
              }
              .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
              }
              .custom-scrollbar::-webkit-scrollbar-thumb {
                background-color: ${isDark ? '#334155' : '#cbd5e1'};
                border-radius: 20px;
              }

              .marquee-container {
                width: 100%;
                overflow: hidden;
                white-space: nowrap;
                position: relative;
                display: flex;
                align-items: center;
              }

              .marquee-text {
                display: inline-block;
                padding-left: 100%;
                animation: marquee 16s linear infinite;
              }

              @keyframes marquee {
                0% { transform: translateX(0); }
                100% { transform: translateX(-100%); }
              }

              @keyframes eqBounce {
                0%, 100% { height: 4px; }
                50% { height: 28px; }
              }
            ` }} />
          </div>
        );
      }

      function NavButton({ icon, label, isActive, onClick, isDark }) {
        return (
          <button onClick={onClick} className={`flex flex-col items-center justify-center p-2 min-w-[60px] transition-all duration-300 ${isActive ? (isDark ? 'text-amber-500' : 'text-blue-600') : 'text-gray-500 dark:text-slate-500 hover:text-gray-800 dark:hover:text-slate-300'}`}>
            <div className={`mb-1.5 transition-transform duration-300 ${isActive ? '-translate-y-1' : ''}`}>{icon}</div>
            <span className={`text-[9px] tracking-wide transition-all duration-300 ${isActive ? 'font-medium opacity-100' : 'font-light opacity-70'}`}>{label}</span>
            <div className={`h-1 w-1 rounded-full mt-1 transition-all duration-300 ${isDark ? 'bg-amber-500' : 'bg-blue-600'} ${isActive ? 'opacity-100 scale-100' : 'opacity-0 scale-0'}`}></div>
          </button>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
