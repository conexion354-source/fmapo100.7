<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FM Apocalipsis 100.7</title>

  <meta name="theme-color" content="#2f5f5a" />
  <meta name="description" content="FM Apocalipsis 100.7 - La voz que viene de lo alto" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logo.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 25%),
        linear-gradient(180deg, #3f736d 0%, #2f5f5a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .player {
      position: relative;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 30px;
      padding: 20px;
      box-shadow:
        0 12px 35px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.18);
      overflow: hidden;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .02em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      background: rgba(255,255,255,.16);
      color: rgba(255,255,255,.82);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 8px 18px rgba(0,0,0,.14);
      transition: background .25s ease, color .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .live-badge.active {
      background: linear-gradient(135deg, #ff5f5f, #ff2f2f);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 18px rgba(255, 59, 59, .25);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: .9;
      box-shadow: 0 0 0 4px rgba(255,255,255,.08);
    }

    .live-badge.active .live-dot {
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.16);
      animation: pulse 1.6s infinite;
    }

    .share-top-btn {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .82rem;
      font-weight: 800;
      letter-spacing: .02em;
      cursor: pointer;
      color: #fff;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 18px rgba(0,0,0,.14);
      transition: transform .15s ease, opacity .15s ease, background .2s ease;
    }

    .share-top-btn:active {
      transform: scale(.98);
    }

    .share-top-btn:hover {
      opacity: .96;
      background: rgba(255,255,255,.16);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255,255,255,.55); }
      70% { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      margin-top: 8px;
    }

    .logo {
      width: 150px;
      max-width: 72%;
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .title {
      text-align: center;
      margin: 0;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .subtitle {
      text-align: center;
      margin: 6px 0 14px;
      color: rgba(255,255,255,.82);
      font-size: .98rem;
      font-weight: 600;
    }

    .audio-visualizer {
      height: 30px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 5px;
      margin: 0 auto 14px;
      max-width: 120px;
    }

    .audio-visualizer span {
      display: block;
      width: 6px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, #c9fff1 0%, #7ff0cd 100%);
      opacity: .35;
      transform-origin: bottom;
      transition: opacity .2s ease;
    }

    .audio-visualizer.playing span {
      opacity: 1;
      animation: waveBounce 1s infinite ease-in-out;
    }

    .audio-visualizer.playing span:nth-child(1) { animation-delay: 0s; }
    .audio-visualizer.playing span:nth-child(2) { animation-delay: .12s; }
    .audio-visualizer.playing span:nth-child(3) { animation-delay: .24s; }
    .audio-visualizer.playing span:nth-child(4) { animation-delay: .36s; }
    .audio-visualizer.playing span:nth-child(5) { animation-delay: .48s; }

    @keyframes waveBounce {
      0%, 100% { height: 8px; }
      50% { height: 28px; }
    }

    .status {
      text-align: center;
      margin-bottom: 18px;
      font-size: .95rem;
      color: #eaf7f4;
      min-height: 22px;
      font-weight: 600;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: rgba(255,255,255,.92);
      color: #173531;
    }

    .btn-primary.playing {
      background: linear-gradient(135deg, #ff8b8b, #ff5f5f);
      color: #fff;
      box-shadow: 0 12px 22px rgba(255, 95, 95, .32);
    }

    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
    }

    .btn-whatsapp {
      background: linear-gradient(135deg, #33d17a, #1faa59);
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
    }

    .btn-youtube {
      background: linear-gradient(135deg, #ff8f8f, #ff6666);
      color: #fff;
      border: 1px solid rgba(255,255,255,.12);
    }

    .btn-announcement {
      background: rgba(255,255,255,.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,.14);
    }

    .btn-announcement.unread {
      background: linear-gradient(135deg, #ff5f5f, #ff2f2f);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 12px 24px rgba(255, 59, 59, .28);
    }

    .full {
      width: 100%;
      margin-top: 10px;
    }

    .link-btn {
      display: block;
      text-decoration: none;
    }

    .hint {
      text-align: center;
      color: rgba(255,255,255,.78);
      font-size: .88rem;
      margin-top: 12px;
      min-height: 18px;
    }

    .weather-widget,
    .today-program-widget,
    .weekly-program-panel,
    .announcement-panel,
    .banner-alert {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .banner-alert {
      display: block;
      background: rgba(255, 59, 59, .16);
      border-color: rgba(255, 95, 95, .30);
    }

    .banner-alert-title {
      font-size: .92rem;
      font-weight: 800;
      color: #ffd6d6;
      margin-bottom: 4px;
    }

    .banner-alert-text {
      font-size: .92rem;
      color: #fff;
      line-height: 1.4;
    }

    .weather-left,
    .today-program-left {
      flex: 1;
      min-width: 0;
    }

    .weather-main,
    .today-program-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      color: #fff;
    }

    .weather-location,
    .today-program-subtitle,
    .today-program-hosts,
    .today-program-note {
      font-size: 13px;
      opacity: 0.82;
      margin-top: 4px;
    }

    .today-program-note {
      color: #ffd6d6;
      opacity: 1;
      font-weight: 600;
    }

    .weather-right img,
    .card-icon {
      width: 50px;
      height: 50px;
      object-fit: contain;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon {
      font-size: 1.55rem;
    }

    .dot {
      margin: 0 5px;
      opacity: 0.7;
    }

    .today-program-widget[hidden],
    .weekly-program-panel[hidden],
    .announcement-panel[hidden],
    .banner-alert[hidden] {
      display: none;
    }

    .program-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .program-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.86);
      border: 1px solid rgba(255,255,255,.12);
    }

    .program-state.red {
      background: rgba(255, 59, 59, .18);
      color: #ff8d8d;
      border-color: rgba(255, 95, 95, .32);
    }

    .program-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .mini-bell-btn,
    .plus-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      color: #fff;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    .plus-btn {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .mini-bell-btn {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .mini-bell-btn:hover,
    .plus-btn:hover {
      opacity: .96;
      background: rgba(255,255,255,.18);
    }

    .mini-bell-btn.enabled {
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
    }

    .plus-btn:active,
    .mini-bell-btn:active {
      transform: scale(.97);
    }

    .weekly-program-panel,
    .announcement-panel {
      display: block;
    }

    .weekly-program-top,
    .announcement-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .weekly-program-title,
    .announcement-title {
      font-size: 1rem;
      font-weight: 800;
      margin: 0;
    }

    .back-btn {
      border: 0;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: .92rem;
      font-weight: 700;
      cursor: pointer;
      background: rgba(255,255,255,.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,.14);
    }

    .weekly-list,
    .announcement-list {
      display: grid;
      gap: 10px;
    }

    .weekly-day,
    .announcement-item {
      border-radius: 16px;
      padding: 12px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
    }

    .weekly-day-name {
      font-size: .95rem;
      font-weight: 800;
      margin-bottom: 8px;
      color: #fff;
    }

    .weekly-item {
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .weekly-item:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .weekly-time {
      font-size: .88rem;
      font-weight: 700;
      color: #c9fff1;
      margin-bottom: 3px;
    }

    .weekly-show {
      font-size: .95rem;
      font-weight: 700;
      color: #fff;
    }

    .weekly-hosts,
    .weekly-note,
    .announcement-item-text {
      font-size: .82rem;
      color: rgba(255,255,255,.78);
      margin-top: 3px;
    }

    .weekly-note {
      color: #ffd6d6;
    }

    .weekly-empty,
    .announcement-empty {
      font-size: .86rem;
      color: rgba(255,255,255,.70);
    }

    @media (max-width: 430px) {
      .top-row {
        margin-bottom: 8px;
      }

      .live-badge,
      .share-top-btn {
        font-size: .76rem;
        padding: 7px 10px;
      }

      .logo-wrap {
        margin-top: 10px;
      }

      .logo {
        width: 138px;
        max-width: 68%;
      }

      .weekly-program-top,
      .announcement-top {
        flex-direction: row;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">

  <script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbxWfdKidGgCYfNBpK-cfPc95KCNUpdLxq7W2eJHtxtVpERNjJ__4MxPhoDYg6S8Is3e/exec";
    const STREAM_HOST = "https://radios.solumedia.com:6322";
    const APP_TIMEZONE = "America/Argentina/Buenos_Aires";

    const radio = document.getElementById("radio");
    const statusEl = document.getElementById("status");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const installBtn = document.getElementById("installBtn");
    const installHint = document.getElementById("installHint");
    const todayProgramWidget = document.getElementById("todayProgramWidget");
    const todayProgramTitle = document.getElementById("todayProgramTitle");
    const todayProgramTime = document.getElementById("todayProgramTime");
    const todayProgramHosts = document.getElementById("todayProgramHosts");
    const todayProgramNote = document.getElementById("todayProgramNote");
    const liveBadge = document.getElementById("liveBadge");
    const shareBtn = document.getElementById("shareBtn");
    const audioVisualizer = document.getElementById("audioVisualizer");
    const programState = document.getElementById("programState");
    const openWeeklyBtn = document.getElementById("openWeeklyBtn");
    const closeWeeklyBtn = document.getElementById("closeWeeklyBtn");
    const weeklyProgramPanel = document.getElementById("weeklyProgramPanel");
    const weeklyList = document.getElementById("weeklyList");
    const programNotifyBtn = document.getElementById("programNotifyBtn");
    const announcementBtn = document.getElementById("announcementBtn");
    const announcementPanel = document.getElementById("announcementPanel");
    const announcementList = document.getElementById("announcementList");
    const closeAnnouncementBtn = document.getElementById("closeAnnouncementBtn");
    const bannerAlert = document.getElementById("bannerAlert");
    const bannerAlertText = document.getElementById("bannerAlertText");

    let deferredPrompt = null;
    let lastProgramNotificationKey = "";
    let currentAnnouncementFingerprint = "";
    let PROGRAMACION = [];
    let AVISOS = [];

    const WEEK_DAYS = [
      { id: 1, name: "Lunes" },
      { id: 2, name: "Martes" },
      { id: 3, name: "Miércoles" },
      { id: 4, name: "Jueves" },
      { id: 5, name: "Viernes" },
      { id: 6, name: "Sábado" },
      { id: 0, name: "Domingo" }
    ];

    function isIOS() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isInStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function activarEstadoPlay() {
      playBtn.classList.add("playing");
      audioVisualizer.classList.add("playing");
    }

    function desactivarEstadoPlay() {
      playBtn.classList.remove("playing");
      audioVisualizer.classList.remove("playing");
    }

    function activarEnVivo() {
      liveBadge.classList.add("active");
    }

    function desactivarEnVivo() {
      liveBadge.classList.remove("active");
    }

    async function compartirApp() {
      const shareData = {
        title: "FM Apocalipsis 100.7",
        text: "Escuchá FM Apocalipsis 100.7 - La voz que viene de lo alto",
        url: "https://conexion354-source.github.io/fmapo100.7/"
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(shareData.url);
          statusEl.textContent = "Enlace copiado para compartir";
          return;
        }

        statusEl.textContent = shareData.url;
      } catch (error) {}
    }

    function timeToMinutes(time) {
      const [hours, minutes] = String(time || "00:00").split(":").map(Number);
      return (hours * 60) + minutes;
    }

    function diaTextoANumero(dia) {
      const mapa = {
        domingo: 0,
        lunes: 1,
        martes: 2,
        miercoles: 3,
        miércoles: 3,
        jueves: 4,
        viernes: 5,
        sabado: 6,
        sábado: 6
      };
      return mapa[String(dia || "").trim().toLowerCase()];
    }

    function getNowParts() {
      const now = new Date();

      const weekdayName = new Intl.DateTimeFormat("es-AR", {
        timeZone: APP_TIMEZONE,
        weekday: "long"
      }).format(now).toLowerCase();

      const timeString = new Intl.DateTimeFormat("en-GB", {
        timeZone: APP_TIMEZONE,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(now);

      const dayMap = {
        domingo: 0,
        lunes: 1,
        martes: 2,
        miércoles: 3,
        miercoles: 3,
        jueves: 4,
        viernes: 5,
        sábado: 6,
        sabado: 6
      };

      return {
        day: dayMap[weekdayName],
        time: timeString
      };
    }

    function getTodayPrograms() {
      const { day } = getNowParts();
      return PROGRAMACION
        .filter(programa => programa.days.includes(day))
        .sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
    }

    function getCurrentProgram() {
      const { day, time } = getNowParts();
      const nowMinutes = timeToMinutes(time);

      return PROGRAMACION.find(programa => {
        if (!programa.days.includes(day)) return false;
        const startMinutes = timeToMinutes(programa.start);
        const endMinutes = timeToMinutes(programa.end);
        return nowMinutes >= startMinutes && nowMinutes < endMinutes;
      }) || null;
    }

    function getActiveAnnouncements() {
      return AVISOS.filter(item => String(item.activo || "").trim().toLowerCase() === "si" && String(item.mensaje || "").trim() !== "");
    }

    function haySuspensionActiva() {
      const avisosActivos = getActiveAnnouncements();

      return avisosActivos.some(item => {
        const mensaje = String(item.mensaje || "").toLowerCase().trim();
        return (
          mensaje.includes("suspendido") ||
          mensaje.includes("suspendida") ||
          mensaje.includes("radio apagada") ||
          mensaje.includes("radio apagado") ||
          mensaje.includes("no se emite") ||
          mensaje.includes("transmisión suspendida") ||
          mensaje.includes("transmision suspendida")
        );
      });
    }

    function getProgramStatusForToday() {
      const { time } = getNowParts();
      const nowMinutes = timeToMinutes(time);
      const programs = getTodayPrograms();

      if (!programs.length) return null;

      const suspensionActiva = haySuspensionActiva();

      const current = programs.find(programa => {
        const startMinutes = timeToMinutes(programa.start);
        const endMinutes = timeToMinutes(programa.end);
        return nowMinutes >= startMinutes && nowMinutes < endMinutes;
      });

      if (current) {
        return {
          program: current,
          label: suspensionActiva ? "Suspendido" : "Ahora",
          className: "red"
        };
      }

      const upcoming = programs.find(programa => nowMinutes < timeToMinutes(programa.start));
      if (upcoming) {
        return {
          program: upcoming,
          label: suspensionActiva ? "Suspendido" : "Próximo",
          className: suspensionActiva ? "red" : ""
        };
      }

      const lastFinished = programs[programs.length - 1];
      return {
        program: lastFinished,
        label: suspensionActiva ? "Suspendido" : "Finalizado",
        className: "red"
      };
    }

    function renderProgramacionDeHoy() {
      const info = getProgramStatusForToday();

      todayProgramWidget.hidden = false;

      if (!info) {
        todayProgramTitle.textContent = "Sin programa hoy";
        todayProgramTime.textContent = "Consultá la programación semanal";
        todayProgramHosts.textContent = "FM Apocalipsis 100.7";
        todayProgramNote.textContent = "";
        todayProgramNote.style.display = "none";
        programState.textContent = "Próximo";
        programState.className = "program-state";
        return;
      }

      todayProgramTitle.textContent = info.program.title || "Programa";
      todayProgramTime.textContent = `${info.program.start} a ${info.program.end} hs`;
      todayProgramHosts.textContent = info.program.hosts || "FM Apocalipsis 100.7";
      todayProgramNote.textContent = info.program.notice || "";
      todayProgramNote.style.display = info.program.notice ? "block" : "none";
      programState.textContent = info.label;
      programState.className = "program-state" + (info.className ? ` ${info.className}` : "");
    }

    function renderWeeklyProgram() {
      weeklyList.innerHTML = "";

      WEEK_DAYS.forEach(day => {
        const items = PROGRAMACION
          .filter(programa => programa.days.includes(day.id))
          .sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));

        const dayEl = document.createElement("div");
        dayEl.className = "weekly-day";

        const titleEl = document.createElement("div");
        titleEl.className = "weekly-day-name";
        titleEl.textContent = day.name;
        dayEl.appendChild(titleEl);

        if (!items.length) {
          const emptyEl = document.createElement("div");
          emptyEl.className = "weekly-empty";
          emptyEl.textContent = "Sin programas cargados";
          dayEl.appendChild(emptyEl);
        } else {
          items.forEach(item => {
            const itemEl = document.createElement("div");
            itemEl.className = "weekly-item";

            itemEl.innerHTML = `
              <div class="weekly-time">${item.start} a ${item.end} hs</div>
              <div class="weekly-show">${item.title}</div>
              <div class="weekly-hosts">${item.hosts || "FM Apocalipsis 100.7"}</div>
              ${item.notice ? `<div class="weekly-note">${item.notice}</div>` : ""}
            `;

            dayEl.appendChild(itemEl);
          });
        }

        weeklyList.appendChild(dayEl);
      });
    }

    function openWeeklyProgram() {
      weeklyProgramPanel.hidden = false;
      announcementPanel.hidden = true;
      todayProgramWidget.hidden = true;
      renderWeeklyProgram();
    }

    function closeWeeklyProgram() {
      weeklyProgramPanel.hidden = true;
      renderProgramacionDeHoy();
    }

    function getAnnouncementFingerprint() {
      return getActiveAnnouncements().map(item => String(item.mensaje).trim()).join("||");
    }

    function getReadAnnouncementFingerprint() {
      return localStorage.getItem("fm_apo_announcements_read") || "";
    }

    function markAnnouncementsAsRead() {
      localStorage.setItem("fm_apo_announcements_read", currentAnnouncementFingerprint || "");
      renderAnnouncementButton();
    }

    function renderAnnouncementButton() {
      const activeAnnouncements = getActiveAnnouncements();
      currentAnnouncementFingerprint = getAnnouncementFingerprint();

      if (!activeAnnouncements.length) {
        announcementBtn.textContent = "📢 Anuncios importantes";
        announcementBtn.classList.remove("unread");
        bannerAlert.hidden = true;
        return;
      }

      const alreadyRead = getReadAnnouncementFingerprint() === currentAnnouncementFingerprint;

      announcementBtn.textContent = alreadyRead ? "📢 Anuncios importantes" : "⚠️ Hay anuncios sin leer";
      announcementBtn.classList.toggle("unread", !alreadyRead);

      bannerAlert.hidden = false;
      bannerAlertText.textContent = activeAnnouncements[0].mensaje;
    }

    function renderAnnouncementPanel() {
      announcementList.innerHTML = "";
      const activeAnnouncements = getActiveAnnouncements();

      if (!activeAnnouncements.length) {
        const emptyEl = document.createElement("div");
        emptyEl.className = "announcement-empty";
        emptyEl.textContent = "No hay anuncios importantes por el momento.";
        announcementList.appendChild(emptyEl);
        return;
      }

      activeAnnouncements.forEach(item => {
        const block = document.createElement("div");
        block.className = "announcement-item";
        block.innerHTML = `<div class="announcement-item-text">${item.mensaje}</div>`;
        announcementList.appendChild(block);
      });
    }

    function openAnnouncementPanel() {
      announcementPanel.hidden = false;
      weeklyProgramPanel.hidden = true;
      todayProgramWidget.hidden = true;
      renderAnnouncementPanel();
      markAnnouncementsAsRead();
    }

    function closeAnnouncementPanel() {
      announcementPanel.hidden = true;
      renderProgramacionDeHoy();
    }

    async function cargarClima() {
      try {
        const lat = -27.83;
        const lon = -61.13;
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.current) return;

        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;

        document.getElementById("weatherTemp").textContent = temp + "°";
        document.getElementById("weatherText").textContent = traducirClima(code);
        document.getElementById("weatherIcon").src = iconoClima(code);
      } catch (error) {
        document.getElementById("weatherText").textContent = "No disponible";
      }
    }

    function traducirClima(code) {
      const clima = {
        0: "Despejado",
        1: "Mayormente despejado",
        2: "Parcialmente nublado",
        3: "Nublado",
        45: "Niebla",
        48: "Niebla",
        51: "Llovizna leve",
        53: "Llovizna",
        55: "Llovizna fuerte",
        61: "Lluvia",
        63: "Lluvia moderada",
        65: "Lluvia fuerte",
        80: "Chubascos",
        81: "Chubascos moderados",
        82: "Chubascos fuertes",
        95: "Tormenta"
      };
      return clima[code] || "Clima actualizado";
    }

    function iconoClima(code) {
      if (code === 0) return "https://openweathermap.org/img/wn/01d@2x.png";
      if (code <= 2) return "https://openweathermap.org/img/wn/02d@2x.png";
      if (code === 3) return "https://openweathermap.org/img/wn/03d@2x.png";
      if (code >= 61) return "https://openweathermap.org/img/wn/09d@2x.png";
      return "https://openweathermap.org/img/wn/02d@2x.png";
    }

    function getFallbackStatusText() {
      const currentProgram = getCurrentProgram();
      return currentProgram ? currentProgram.title : "FM Apocalipsis en vivo";
    }

    function cleanMetadataText(text) {
      if (!text) return "";

      let value = String(text).trim();
      value = value.replace(/^current song[:\-\s]*/i, "");
      value = value.replace(/^currentsong[:\-\s]*/i, "");
      value = value.replace(/^song title[:\-\s]*/i, "");
      value = value.replace(/^streamtitle[:\-\s]*/i, "");
      value = value.replace(/^title[:\-\s]*/i, "");
      value = value.replace(/<[^>]*>/g, "").trim();

      if (!value) return "";
      if (value.length > 120) return value.slice(0, 120).trim();
      return value;
    }

    async function fetchText(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("No se pudo leer " + url);
      return await res.text();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("No se pudo leer " + url);
      return await res.json();
    }

    function extractFromJson(data) {
      if (!data) return "";

      const directFields = [
        data.title,
        data.songtitle,
        data.currentsong,
        data.current_song,
        data.song,
        data.nowplaying,
        data.now_playing
      ];

      for (const item of directFields) {
        const cleaned = cleanMetadataText(item);
        if (cleaned) return cleaned;
      }

      const nestedCandidates = [
        data?.stats?.songtitle,
        data?.stats?.title,
        data?.streamstatus?.songtitle,
        data?.streamstatus?.title,
        data?.icestats?.source?.title
      ];

      for (const item of nestedCandidates) {
        const cleaned = cleanMetadataText(item);
        if (cleaned) return cleaned;
      }

      return "";
    }

    function extractFromText(text) {
      if (!text) return "";

      const cleanedFull = cleanMetadataText(text);
      if (cleanedFull && !cleanedFull.includes("{") && !cleanedFull.includes("[") && cleanedFull.length < 120) {
        return cleanedFull;
      }

      const patterns = [
        /StreamTitle='([^']+)'/i,
        /"title"\s*:\s*"([^"]+)"/i,
        /"songtitle"\s*:\s*"([^"]+)"/i,
        /current song[:\s-]+(.+)/i,
        /currentsong[:\s-]+(.+)/i,
        /song title[:\s-]+(.+)/i
      ];

      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match && match[1]) {
          const cleaned = cleanMetadataText(match[1]);
          if (cleaned) return cleaned;
        }
      }

      return "";
    }

    async function getStreamingMetadata() {
      const attempts = [
        async () => extractFromText(await fetchText(`${STREAM_HOST}/currentsong?sid=1`)),
        async () => extractFromText(await fetchText(`${STREAM_HOST}/currentsong?sid=0`)),
        async () => extractFromJson(await fetchJson(`${STREAM_HOST}/statistics?sid=1&json=1`)),
        async () => extractFromJson(await fetchJson(`${STREAM_HOST}/statistics?sid=0&json=1`)),
        async () => extractFromJson(await fetchJson(`${STREAM_HOST}/stats?sid=1&json=1`)),
        async () => extractFromJson(await fetchJson(`${STREAM_HOST}/stats?sid=0&json=1`)),
        async () => extractFromText(await fetchText(`${STREAM_HOST}/stats?sid=1`)),
        async () => extractFromText(await fetchText(`${STREAM_HOST}/stats?sid=0`)),
        async () => extractFromText(await fetchText(`${STREAM_HOST}/7.html`)),
        async () => extractFromText(await fetchText(`${STREAM_HOST}/played?sid=1&type=json&count=1`)),
        async () => extractFromText(await fetchText(`${STREAM_HOST}/played?sid=0&type=json&count=1`))
      ];

      for (const attempt of attempts) {
        try {
          const result = await attempt();
          if (result) return result;
        } catch (e) {}
      }

      return "";
    }

    async function cargarStatsRadio() {
      if (radio.paused) return;

      try {
        const nowPlaying = await getStreamingMetadata();
        statusEl.textContent = nowPlaying || getFallbackStatusText();
      } catch (error) {
        statusEl.textContent = getFallbackStatusText();
      }
    }

    function updateProgramNotifyButton() {
      if (!("Notification" in window)) {
        programNotifyBtn.style.display = "none";
        return;
      }

      programNotifyBtn.style.display = "inline-flex";
      programNotifyBtn.classList.toggle("enabled", Notification.permission === "granted");
    }

    function maybeNotifyProgramStart() {
      const currentProgram = getCurrentProgram();
      if (!currentProgram) return;
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;
      if (haySuspensionActiva()) return;

      const todayKey = `${getNowParts().day}-${currentProgram.start}-${currentProgram.title}`;
      if (lastProgramNotificationKey === todayKey) return;

      new Notification("FM Apocalipsis 100.7", {
        body: `${currentProgram.title} ya está en vivo${currentProgram.hosts ? " · " + currentProgram.hosts : ""}`
      });

      lastProgramNotificationKey = todayKey;
    }

    function initProgramNotifyButton() {
      updateProgramNotifyButton();

      if (!("Notification" in window)) return;

      programNotifyBtn.addEventListener("click", async () => {
        if (Notification.permission === "granted") {
          statusEl.textContent = "Avisos del programa activados";
          updateProgramNotifyButton();
          maybeNotifyProgramStart();
          return;
        }

        if (Notification.permission === "denied") {
          statusEl.textContent = "Las notificaciones están bloqueadas";
          updateProgramNotifyButton();
          return;
        }

        try {
          const permission = await Notification.requestPermission();
          if (permission === "granted") {
            statusEl.textContent = "Avisos del programa activados";
            updateProgramNotifyButton();
            maybeNotifyProgramStart();
          } else if (permission === "denied") {
            statusEl.textContent = "Las notificaciones fueron bloqueadas";
            updateProgramNotifyButton();
          }
        } catch (e) {}
      });
    }

    async function cargarDatosRemotos() {
      try {
        const res = await fetch(SHEET_API_URL + "?t=" + Date.now(), {
          cache: "no-store"
        });

        if (!res.ok) throw new Error("No se pudo cargar Google Sheet");

        const data = await res.json();

        const rawProgramacion = Array.isArray(data.programacion) ? data.programacion : [];
        const rawAvisos = Array.isArray(data.avisos) ? data.avisos : [];

        PROGRAMACION = rawProgramacion
          .filter(item =>
            String(item.dia || "").trim() !== "" &&
            String(item.inicio || "").trim() !== "" &&
            String(item.fin || "").trim() !== ""
          )
          .map(item => {
            const dayNumber = diaTextoANumero(item.dia);

            return {
              id: String(item.id || "").trim(),
              days: typeof dayNumber === "number" ? [dayNumber] : [],
              start: String(item.inicio || "").trim(),
              end: String(item.fin || "").trim(),
              title: String(item.programa || "").trim(),
              hosts: String(item.conductores || "").trim(),
              notice: String(item.aviso || "").trim()
            };
          })
          .filter(item => item.days.length);

        AVISOS = rawAvisos.map(item => ({
          mensaje: String(item.mensaje || "").trim(),
          activo: String(item.activo || "").trim().toLowerCase()
        }));

        if (weeklyProgramPanel.hidden && announcementPanel.hidden) {
          renderProgramacionDeHoy();
        } else if (!weeklyProgramPanel.hidden) {
          renderWeeklyProgram();
        } else if (!announcementPanel.hidden) {
          renderAnnouncementPanel();
        }

        renderAnnouncementButton();
      } catch (error) {
        console.error("Error cargando datos remotos:", error);
        renderProgramacionDeHoy();
      }
    }

    playBtn.addEventListener("click", async () => {
      try {
        statusEl.textContent = "Conectando...";
        await radio.play();
      } catch (err) {
        statusEl.textContent = "No se pudo reproducir. Toca Play otra vez.";
        desactivarEstadoPlay();
        desactivarEnVivo();
      }
    });

    pauseBtn.addEventListener("click", () => {
      radio.pause();
      statusEl.textContent = "Pausado";
      desactivarEstadoPlay();
      desactivarEnVivo();
    });

    shareBtn.addEventListener("click", compartirApp);
    openWeeklyBtn.addEventListener("click", openWeeklyProgram);
    closeWeeklyBtn.addEventListener("click", closeWeeklyProgram);
    announcementBtn.addEventListener("click", openAnnouncementPanel);
    closeAnnouncementBtn.addEventListener("click", closeAnnouncementPanel);

    radio.addEventListener("waiting", () => {
      statusEl.textContent = "Conectando...";
    });

    radio.addEventListener("playing", async () => {
      activarEstadoPlay();
      activarEnVivo();
      await cargarStatsRadio();
    });

    radio.addEventListener("pause", () => {
      if (radio.paused) {
        statusEl.textContent = "Pausado";
        desactivarEstadoPlay();
        desactivarEnVivo();
      }
    });

    radio.addEventListener("ended", () => {
      desactivarEstadoPlay();
      desactivarEnVivo();
      statusEl.textContent = "Finalizado";
    });

    radio.addEventListener("error", () => {
      statusEl.textContent = "Error al cargar el audio";
      desactivarEstadoPlay();
      desactivarEnVivo();
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;
      installHint.textContent = "";
    });

    installBtn.addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        installBtn.hidden = true;
        return;
      }

      if (isIOS() && !isInStandaloneMode()) {
        installHint.textContent = "En iPhone: Compartir → Añadir a pantalla de inicio";
        return;
      }

      installHint.textContent = "Si no aparece el aviso, usa el menú del navegador para instalar.";
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
      installHint.textContent = "App instalada correctamente";
    });

    if (isIOS() && !isInStandaloneMode()) {
      installBtn.hidden = false;
      installHint.textContent = "En iPhone se instala desde Compartir → Añadir a pantalla de inicio";
    }

    cargarClima();
    renderProgramacionDeHoy();
    cargarDatosRemotos();
    renderAnnouncementButton();
    initProgramNotifyButton();
    maybeNotifyProgramStart();

    setInterval(cargarClima, 600000);
    setInterval(() => {
      if (!radio.paused) {
        cargarStatsRadio();
      }
    }, 30000);
    setInterval(() => {
      cargarDatosRemotos();
      maybeNotifyProgramStart();
    }, 15000);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
