<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FM Apocalipsis 100.7</title>

  <meta name="theme-color" content="#2f5f5a" />
  <meta name="description" content="FM Apocalipsis 100.7 - Radio cristiana online" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logo.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 25%),
        linear-gradient(180deg, #3f736d 0%, #2f5f5a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    .player {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 30px;
      padding: 22px;
      box-shadow:
        0 12px 35px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }

    .logo {
      width: 180px;
      max-width: 80%;
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    .title {
      text-align: center;
      margin: 0;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .subtitle {
      text-align: center;
      margin: 6px 0 18px;
      color: rgba(255,255,255,.82);
      font-size: .98rem;
    }

    .status {
      text-align: center;
      margin-bottom: 18px;
      font-size: .95rem;
      color: #eaf7f4;
      min-height: 22px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    .btn:active {
      transform: scale(.98);
    }

    .btn-primary {
      background: rgba(255,255,255,.92);
      color: #173531;
    }

    .btn-secondary {
      background: rgba(255,255,255,.18);
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
    }

    .full {
      width: 100%;
      margin-top: 10px;
    }

    .link-btn {
      display: block;
      text-decoration: none;
      text-align: center;
    }

    .hint {
      text-align: center;
      color: rgba(255,255,255,.78);
      font-size: .88rem;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="player">
      <div class="logo-wrap">
        <img src="logo.png" alt="FM Apocalipsis 100.7" class="logo" />
      </div>

      <h1 class="title">FM Apocalipsis 100.7</h1>
      <p class="subtitle">Radio cristiana online</p>

      <div class="status" id="status">Listo para reproducir</div>

      <audio id="radio" preload="none" playsinline>
        <source src="https://radios.solumedia.com:6322/stream" type="audio/mpeg" />
      </audio>

      <div class="controls">
        <button class="btn btn-primary" id="playBtn">▶ Play</button>
        <button class="btn btn-secondary" id="pauseBtn">⏸ Pausa</button>
      </div>

      <button class="btn btn-primary full" id="installBtn" hidden>📲 Instalar App</button>

      <a
        class="link-btn"
        href="https://chat.whatsapp.com/FQnkIaic0ZEKR5nYNmheOV?mode=hq2tswi"
        target="_blank"
        rel="noopener noreferrer"
      >
        <button class="btn btn-secondary full" type="button">💬 Unirse al grupo de WhatsApp</button>
      </a>

      <a
        class="link-btn"
        href="https://www.youtube.com/@zonafe"
        target="_blank"
        rel="noopener noreferrer"
      >
        <button class="btn btn-secondary full" type="button">▶ Mira Zona Fe en vivo</button>
      </a>

      <div class="hint" id="installHint"></div>
    </div>
  </div>

  <script>
    const radio = document.getElementById("radio");
    const statusEl = document.getElementById("status");
    const playBtn = document.getElementById("playBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const installBtn = document.getElementById("installBtn");
    const installHint = document.getElementById("installHint");

    let deferredPrompt = null;

    function isIOS() {
      return /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    }

    function isInStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    playBtn.addEventListener("click", async () => {
      try {
        await radio.play();
        statusEl.textContent = "Transmitiendo en vivo";
      } catch (err) {
        statusEl.textContent = "No se pudo reproducir. Toca Play otra vez.";
      }
    });

    pauseBtn.addEventListener("click", () => {
      radio.pause();
      statusEl.textContent = "Pausado";
    });

    radio.addEventListener("waiting", () => {
      statusEl.textContent = "Cargando audio...";
    });

    radio.addEventListener("playing", () => {
      statusEl.textContent = "Transmitiendo en vivo";
    });

    radio.addEventListener("error", () => {
      statusEl.textContent = "Error al cargar el audio";
    });

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.hidden = false;
      installHint.textContent = "";
    });

    installBtn.addEventListener("click", async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          await deferredPrompt.userChoice;
        } catch (e) {}
        deferredPrompt = null;
        installBtn.hidden = true;
        return;
      }

      if (isIOS() && !isInStandaloneMode()) {
        installHint.textContent = "En iPhone: Compartir → Añadir a pantalla de inicio";
        return;
      }

      installHint.textContent = "Si no aparece el aviso, usa el menú del navegador para instalar.";
    });

    window.addEventListener("appinstalled", () => {
      installBtn.hidden = true;
      installHint.textContent = "App instalada correctamente";
    });

    if (isIOS() && !isInStandaloneMode()) {
      installBtn.hidden = false;
      installHint.textContent = "En iPhone se instala desde Compartir → Añadir a pantalla de inicio";
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
