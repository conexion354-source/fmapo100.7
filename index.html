<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="FM Apocalipsis 100.7 - Radio en vivo" />
    <title>FM Apocalipsis 100.7</title>

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="logo.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>

    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0a0a0a;
        overscroll-behavior: none;
      }
      .animate-spin-slow {
        animation: spin 2s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
      window.react = window.React;
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script>
      window.__firebase_config = {
        apiKey: "AIzaSyA08xzcxTLjZT3kh5e5A57pBvHRlwETe-w",
        authDomain: "fmapolipsischat.firebaseapp.com",
        projectId: "fmapolipsischat",
        storageBucket: "fmapolipsischat.firebasestorage.app",
        messagingSenderId: "41472374951",
        appId: "1:41472374951:web:27a9ba0cd3e6f590a84382"
      };
      window.__app_id = "radio-apocalipsis-default";
    </script>
    <script src="https://unpkg.com/lucide-react@0.468.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-presets="env,react">
      const { useState, useRef, useEffect, useMemo } = React;
      const {
        Play,
        Pause,
        Radio,
        Volume2,
        VolumeX,
        MessageCircle,
        MoreVertical,
        Minus,
        CalendarDays,
        MonitorPlay,
        Youtube,
        Facebook,
        Users,
        Sun,
        Moon,
        Clock,
        RefreshCw,
        Bell,
        BellRing,
        Share2,
        Download,
        AlertTriangle,
        Send,
        User,
        Trash2,
        Smile
      } = LucideReact;

      // Compat helpers para soportar sintaxis modular sobre SDK compat
      const initializeApp = (config) => {
        if (!config || typeof firebase === 'undefined') return null;
        return firebase.apps && firebase.apps.length ? firebase.app() : firebase.initializeApp(config);
      };
      const getAuth = (app) => app ? firebase.auth(app) : null;
      const getFirestore = (app) => app ? firebase.firestore(app) : null;
      const signInAnonymously = (authRef) => authRef.signInAnonymously();
      const signInWithCustomToken = (authRef, token) => authRef.signInWithCustomToken(token);
      const onAuthStateChanged = (authRef, cb) => authRef.onAuthStateChanged(cb);
      const serverTimestamp = () => firebase.firestore.FieldValue.serverTimestamp();

      const resolvePath = (dbRef, segments) => {
        let ref = dbRef;
        segments.forEach((segment, index) => {
          ref = index % 2 === 0 ? ref.collection(segment) : ref.doc(segment);
        });
        return ref;
      };

      const collection = (dbRef, ...segments) => resolvePath(dbRef, segments);
      const doc = (dbRef, ...segments) => resolvePath(dbRef, segments);
      const addDoc = (collectionRef, data) => collectionRef.add(data);
      const onSnapshot = (ref, next, error) => ref.onSnapshot(next, error);
      const query = (ref) => ref;
      const setDoc = (docRef, data, opts) => docRef.set(data, opts);
      const deleteDoc = (docRef) => docRef.delete();

      const rawFirebaseConfig = (typeof __firebase_config !== 'undefined' && __firebase_config)
        ? __firebase_config
        : (window.__firebase_config || null);
      const parsedFirebaseConfig = typeof rawFirebaseConfig === 'string'
        ? JSON.parse(rawFirebaseConfig)
        : rawFirebaseConfig;

      const appId = typeof __app_id !== 'undefined' ? __app_id : (window.__app_id || 'radio-apocalipsis-default');
      const app = initializeApp(parsedFirebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const TikTokIcon = ({ size = 24, className = "" }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
        </svg>
      );

      function App() {
        const [isPlaying, setIsPlaying] = useState(false);
        const [activeTab, setActiveTab] = useState('home');
        const [volume, setVolume] = useState(80);
        const [isMuted, setIsMuted] = useState(false);
        const [selectedDay, setSelectedDay] = useState('L');
        const [nowPlaying, setNowPlaying] = useState('');
        const [listeners, setListeners] = useState(0);
        const [streamError, setStreamError] = useState(false);

        const [user, setUser] = useState(null);
        const [messages, setMessages] = useState([]);
        const [newMessage, setNewMessage] = useState('');
        const [userName, setUserName] = useState('');
        const [isSettingName, setIsSettingName] = useState(false);
        const [unreadCount, setUnreadCount] = useState(0);
        const [isInputFocused, setIsInputFocused] = useState(false);
        const [msgToDelete, setMsgToDelete] = useState(null);
        const [showEmojis, setShowEmojis] = useState(false);
        const chatScrollRef = useRef(null);
        const pressTimer = useRef(null);

        const [scheduleData, setScheduleData] = useState({
          'L': [], 'M': [], 'X': [], 'J': [], 'V': [], 'S': [], 'D': []
        });
        const [promoGifs, setPromoGifs] = useState([]);

        const [currentAdIndex, setCurrentAdIndex] = useState(0);
        const [notificationsEnabled, setNotificationsEnabled] = useState({});
        const [toastMsg, setToastMsg] = useState(null);
        const [themeMode, setThemeMode] = useState(() => {
          try {
            return window.localStorage.getItem('fm-theme-mode') || 'auto';
          } catch (_) {
            return 'auto';
          }
        });
        const [isDark, setIsDark] = useState(true);
        const [currentProgram, setCurrentProgram] = useState(null);
        const [viewportHeight, setViewportHeight] = useState(() => window.innerHeight);
        const [viewportOffsetTop, setViewportOffsetTop] = useState(0);
        const [keyboardOpen, setKeyboardOpen] = useState(false);

        const [deferredPrompt, setDeferredPrompt] = useState(null);
        const [isInstallable, setIsInstallable] = useState(false);

        const audioRef = useRef(null);
        const streamUrl = "https://radios.solumedia.com:6322/stream";
        const googleSheetsCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQP-N3so4cbqVC-4RfmlqZlRZapDugeYTSfrAjDKj8UghSOuqrvipAXXTQBCV5WEIoSajBhLoYfk5cO/pub?output=csv";

        const formatMsgDate = (timestamp) => {
          if (!timestamp) return "";
          try {
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return new Intl.DateTimeFormat('es-AR', { hour: '2-digit', minute: '2-digit' }).format(date);
          } catch (e) {
            return "";
          }
        };

        const toggleThemeMode = () => {
          if (themeMode === 'auto') setThemeMode('light');
          else if (themeMode === 'light') setThemeMode('dark');
          else setThemeMode('auto');
        };

        useEffect(() => {
          const visualViewport = window.visualViewport;
          const updateViewport = () => {
            const currentHeight = visualViewport ? Math.round(visualViewport.height) : window.innerHeight;
            setViewportHeight(currentHeight);
            const currentOffsetTop = visualViewport ? Math.max(0, Math.round(visualViewport.offsetTop)) : 0;
            setViewportOffsetTop(currentOffsetTop);

            const delta = window.innerHeight - currentHeight;
            setKeyboardOpen(activeTab === 'chat' && delta > 120);
          };

          updateViewport();
          window.addEventListener('resize', updateViewport);
          if (visualViewport) {
            visualViewport.addEventListener('resize', updateViewport);
            visualViewport.addEventListener('scroll', updateViewport);
          }

          return () => {
            window.removeEventListener('resize', updateViewport);
            if (visualViewport) {
              visualViewport.removeEventListener('resize', updateViewport);
              visualViewport.removeEventListener('scroll', updateViewport);
            }
          };
        }, [activeTab]);

        useEffect(() => {
          if (!(activeTab === 'chat' && (isInputFocused || keyboardOpen))) return;

          const keepPageAtTop = () => {
            if (window.scrollY !== 0) {
              window.scrollTo(0, 0);
            }
          };

          keepPageAtTop();
          const t1 = setTimeout(keepPageAtTop, 60);
          const t2 = setTimeout(keepPageAtTop, 180);

          window.addEventListener('scroll', keepPageAtTop, { passive: true });
          return () => {
            clearTimeout(t1);
            clearTimeout(t2);
            window.removeEventListener('scroll', keepPageAtTop);
          };
        }, [activeTab, isInputFocused, keyboardOpen]);

        useEffect(() => {
          const initAuth = async () => {
            if (!auth) return;
            try {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
              } else {
                await signInAnonymously(auth);
              }
            } catch (error) {
              console.error("Error Auth:", error);
            }
          };
          initAuth();
          if (!auth) return;
          const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
            setUser(currentUser);
            if (currentUser?.displayName) setUserName(currentUser.displayName);
          });
          return () => unsubscribe();
        }, []);

        useEffect(() => {
          if (!user || !db) return;
          const messagesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
          const unsubscribe = onSnapshot(messagesCollection, (snapshot) => {
            const msgs = snapshot.docs.map((docItem) => ({ id: docItem.id, ...docItem.data() }));
            msgs.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
            if (activeTab !== 'chat' && msgs.length > messages.length && messages.length > 0) {
              setUnreadCount((prev) => prev + (msgs.length - messages.length));
            }
            setMessages(msgs.slice(-100));
          }, (error) => {
            console.error("Error Chat:", error);
          });
          return () => unsubscribe();
        }, [user, activeTab, messages.length]);

        useEffect(() => {
          if (activeTab === 'chat') setUnreadCount(0);
        }, [activeTab]);

        useEffect(() => {
          if (activeTab !== 'chat') return;
          const chatContainer = chatScrollRef.current;
          if (!chatContainer) return;
          requestAnimationFrame(() => {
            chatContainer.scrollTop = chatContainer.scrollHeight;
          });
        }, [messages, activeTab, keyboardOpen, showEmojis]);

        const handlePressStart = (msg) => {
          if (msg.userId !== user?.uid) return;
          pressTimer.current = setTimeout(() => {
            setMsgToDelete(msg);
            pressTimer.current = null;
          }, 500);
        };

        const handlePressCancel = () => {
          if (pressTimer.current) {
            clearTimeout(pressTimer.current);
            pressTimer.current = null;
          }
        };

        const confirmDeleteMessage = async () => {
          if (!msgToDelete || !db) return;
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'messages', msgToDelete.id));
            setMsgToDelete(null);
            showToast("Mensaje eliminado");
          } catch (error) {
            showToast("No se pudo eliminar");
          }
        };

        const handleSendMessage = async (e) => {
          e.preventDefault();
          if (!newMessage.trim() || !user || !db) return;
          if (!userName) {
            setIsSettingName(true);
            return;
          }
          try {
            const messagesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            await addDoc(messagesCollection, {
              text: String(newMessage),
              sender: String(userName),
              userId: user.uid,
              timestamp: serverTimestamp()
            });
            setNewMessage('');
          } catch (error) {
            showToast("Error al enviar mensaje");
          }
        };

        const saveUserName = () => {
          if (userName.trim()) {
            setIsSettingName(false);
            showToast(`¡Hola ${userName}!`);
          }
        };

        const isStandaloneDisplayMode = () => (
          window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true
        );

        useEffect(() => {
          const handleBeforeInstallPrompt = (e) => {
            e.preventDefault();
            setDeferredPrompt(e);
            setIsInstallable(true);
          };
          const handleAppInstalled = () => {
            setDeferredPrompt(null);
            setIsInstallable(false);
          };
          window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
          window.addEventListener('appinstalled', handleAppInstalled);
          return () => {
            window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            window.removeEventListener('appinstalled', handleAppInstalled);
          };
        }, []);

        useEffect(() => {
          const ua = navigator.userAgent || '';
          const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);

          const updateInstallVisibility = () => {
            if (isStandaloneDisplayMode()) {
              setIsInstallable(false);
              return;
            }
            if (deferredPrompt) {
              setIsInstallable(true);
              return;
            }
            // Fallback: algunos navegadores móviles (incluyendo Samsung Internet)
            // no disparan beforeinstallprompt consistentemente.
            if (isMobile) setIsInstallable(true);
          };

          updateInstallVisibility();
          window.addEventListener('focus', updateInstallVisibility);
          document.addEventListener('visibilitychange', updateInstallVisibility);
          return () => {
            window.removeEventListener('focus', updateInstallVisibility);
            document.removeEventListener('visibilitychange', updateInstallVisibility);
          };
        }, [deferredPrompt]);

        const handleInstallClick = async () => {
          if (isStandaloneDisplayMode()) return;

          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') setIsInstallable(false);
            setDeferredPrompt(null);
            return;
          }

          const ua = navigator.userAgent || '';
          if (/iPhone|iPad|iPod/i.test(ua)) {
            showToast('iPhone: Compartir > Añadir a pantalla de inicio');
          } else {
            showToast('Android/Samsung: menú ⋮ > Instalar app');
          }
        };

        const handleShare = async () => {
          const shareData = { title: 'FM Apocalipsis 100.7', url: window.location.href };
          if (navigator.share) {
            try {
              await navigator.share(shareData);
            } catch (err) {
            }
          } else {
            try {
              const textArea = document.createElement("textarea");
              textArea.value = window.location.href;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand('copy');
              document.body.removeChild(textArea);
              showToast('¡Enlace copiado!');
            } catch (_) {
            }
          }
        };

        useEffect(() => {
          const fetchSchedule = async () => {
            try {
              const response = await fetch(googleSheetsCsvUrl);
              const text = await response.text();
              const rows = [];
              let quote = false, row = 0, col = 0;
              for (let c = 0; c < text.length; c++) {
                let cc = text[c], nc = text[c + 1];
                rows[row] = rows[row] || [];
                rows[row][col] = rows[row][col] || '';
                if (cc === '"' && quote && nc === '"') { rows[row][col] += cc; ++c; continue; }
                if (cc === '"') { quote = !quote; continue; }
                if (cc === ',' && !quote) { ++col; continue; }
                if ((cc === '\r' || cc === '\n') && !quote) {
                  if (rows[row][col] !== '' || col !== 0) {
                    ++row;
                    col = 0;
                  }
                  if (cc === '\r' && nc === '\n') ++c;
                  continue;
                }
                rows[row][col] += cc;
              }

              const newSchedule = { 'L': [], 'M': [], 'X': [], 'J': [], 'V': [], 'S': [], 'D': [] };
              const newGifs = [];
              for (let i = 1; i < rows.length; i++) {
                const r = rows[i];
                if (r && r.length >= 4 && r[0]) {
                  const dia = r[0].trim().toUpperCase();
                  if (dia === 'IMG') {
                    const imgUrl = r[3] ? r[3].trim() : '';
                    if (imgUrl && !newGifs.includes(imgUrl)) newGifs.push(imgUrl);
                    continue;
                  }
                  const title = r[3] ? r[3].trim() : '';
                  if (title !== '') {
                    const imageUrl = r.length >= 7 && r[6] ? r[6].trim() : null;
                    if (imageUrl && !newGifs.includes(imageUrl)) newGifs.push(imageUrl);
                    if (newSchedule[dia]) {
                      newSchedule[dia].push({
                        start: r[1]?.trim(),
                        end: r[2]?.trim(),
                        title,
                        hosts: r[4]?.trim(),
                        image: imageUrl
                      });
                    }
                  }
                }
              }
              setScheduleData(newSchedule);
              if (newGifs.length > 0) setPromoGifs(newGifs);
            } catch (error) {
              console.error(error);
            }
          };
          fetchSchedule();
          const interval = setInterval(fetchSchedule, 30000);
          return () => clearInterval(interval);
        }, []);

        useEffect(() => {
          const checkCurrentProgram = () => {
            const now = new Date();
            const todayLetter = ['D', 'L', 'M', 'X', 'J', 'V', 'S'][now.getDay()];
            const timeNumber = now.getHours() + (now.getMinutes() / 60);
            const todaysPrograms = scheduleData[todayLetter];
            let activeProgram = null;
            if (todaysPrograms) {
              for (const prog of todaysPrograms) {
                if (!prog.start || !prog.end) continue;
                const [hS, mS] = prog.start.split(':');
                const startNum = parseInt(hS) + (parseInt(mS || 0) / 60);
                const [hE, mE] = prog.end.split(':');
                const endNum = parseInt(hE) + (parseInt(mE || 0) / 60);
                if (startNum > endNum ? (timeNumber >= startNum || timeNumber < endNum) : (timeNumber >= startNum && timeNumber < endNum)) {
                  activeProgram = prog;
                  break;
                }
              }
            }
            setCurrentProgram(activeProgram);
          };
          checkCurrentProgram();
          const timerId = setInterval(checkCurrentProgram, 60000);
          return () => clearInterval(timerId);
        }, [scheduleData]);

        const displayGifs = useMemo(() => {
          let gifs = [...promoGifs];
          if (currentProgram && currentProgram.image && !gifs.includes(currentProgram.image)) gifs = [currentProgram.image, ...gifs];
          return gifs;
        }, [promoGifs, currentProgram]);

        useEffect(() => {
          if (displayGifs.length <= 1) {
            setCurrentAdIndex(0);
            return;
          }
          const adInterval = setInterval(() => {
            setCurrentAdIndex((prev) => (prev + 1) % displayGifs.length);
          }, 6000);
          return () => clearInterval(adInterval);
        }, [displayGifs.length]);

        const safeAdIndex = displayGifs.length > 0 ? currentAdIndex % displayGifs.length : 0;
        const currentDisplayedImage = displayGifs[safeAdIndex];
        const isShowingLivePromo = currentProgram && currentProgram.image && currentDisplayedImage === currentProgram.image;
        const isCompactHomeLayout = viewportHeight <= 760;
        const metadataText = (currentProgram?.title && String(currentProgram.title).trim())
          ? String(currentProgram.title).trim()
          : ((nowPlaying && nowPlaying.trim()) ? nowPlaying.trim() : 'FM Apocalipsis 100.7');

        const syncToLive = () => {
          if (audioRef.current) {
            setIsPlaying(false);
            setStreamError(false);
            audioRef.current.src = streamUrl;
            audioRef.current.load();
            audioRef.current.play()
              .then(() => {
                setIsPlaying(true);
                setupMediaSession();
              })
              .catch((e) => {
                if (e.name !== 'AbortError') {
                  setStreamError(true);
                  setIsPlaying(false);
                }
              });
          }
        };

        const togglePlay = () => isPlaying ? (audioRef.current.pause(), setIsPlaying(false)) : syncToLive();

        const handleVolumeChange = (e) => {
          const v = e.target.value;
          setVolume(v);
          if (audioRef.current) audioRef.current.volume = v / 100;
        };

        const setupMediaSession = () => {
          if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
              title: metadataText,
              artist: 'La voz que viene de lo alto',
              artwork: currentDisplayedImage ? [{ src: currentDisplayedImage, sizes: '512x512', type: 'image/jpeg' }] : []
            });
          }
        };

        const showToast = (msg) => {
          setToastMsg(msg);
          setTimeout(() => setToastMsg(null), 3000);
        };

        useEffect(() => {
          const applyTheme = () => {
            let nextIsDark = true;
            if (themeMode === 'dark') nextIsDark = true;
            else if (themeMode === 'light') nextIsDark = false;
            else nextIsDark = new Date().getHours() >= 18 || new Date().getHours() < 6;
            setIsDark(nextIsDark);

            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) {
              metaTheme.setAttribute('content', nextIsDark ? '#0a0a0a' : '#e5e7eb');
            }
          };
          applyTheme();

          try {
            window.localStorage.setItem('fm-theme-mode', themeMode);
          } catch (_) {
          }

          let autoTimer = null;
          if (themeMode === 'auto') {
            autoTimer = setInterval(applyTheme, 60000);
          }

          window.addEventListener('focus', applyTheme);
          document.addEventListener('visibilitychange', applyTheme);
          return () => {
            if (autoTimer) clearInterval(autoTimer);
            window.removeEventListener('focus', applyTheme);
            document.removeEventListener('visibilitychange', applyTheme);
          };
        }, [themeMode]);

        useEffect(() => {
          let cancelled = false;
          let jsonpId = 0;

          const parseAndApplyStats = (d) => {
            if (!d || typeof d !== 'object' || cancelled) return;
            const pickTitle = [d.songtitle, d.servertitle, d.title, d.currenttrack]
              .find((v) => typeof v === 'string' && v.trim() && v.trim().toLowerCase() !== 'no name');
            const listenersRaw = d.currentlisteners ?? d.listeners ?? d.listener_count ?? d.listener;
            const nextListeners = Number.parseInt(String(listenersRaw ?? ''), 10);

            setNowPlaying(pickTitle ? String(pickTitle).trim() : '');
            setListeners(Number.isFinite(nextListeners) ? nextListeners : 0);
          };

          const fetchStatsJsonp = () => new Promise((resolve, reject) => {
            const callbackName = `__fmStatsCb_${Date.now()}_${jsonpId++}`;
            const script = document.createElement('script');
            let timeoutId = null;

            const cleanup = () => {
              if (timeoutId) clearTimeout(timeoutId);
              if (window[callbackName]) {
                try {
                  delete window[callbackName];
                } catch (_) {
                  window[callbackName] = undefined;
                }
              }
              if (script.parentNode) script.parentNode.removeChild(script);
            };

            window[callbackName] = (payload) => {
              cleanup();
              resolve(payload);
            };

            script.async = true;
            script.onerror = () => {
              cleanup();
              reject(new Error('jsonp_error'));
            };
            script.src = `https://radios.solumedia.com:6322/stats?sid=1&json=1&callback=${callbackName}&_=${Date.now()}`;

            timeoutId = window.setTimeout(() => {
              cleanup();
              reject(new Error('jsonp_timeout'));
            }, 8000);

            document.head.appendChild(script);
          });

          const fetchMetadata = async () => {
            let data = null;

            try {

                    <div className="flex gap-3">
                      <button onClick={() => setMsgToDelete(null)} className="flex-1 py-3 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-700 dark:text-gray-300 font-bold text-sm transition-colors hover:bg-gray-200 dark:hover:bg-slate-700">Cancelar</button>
                      <button onClick={confirmDeleteMessage} className="flex-1 py-3 rounded-xl bg-red-600 text-white font-bold text-sm hover:bg-red-700 transition-colors shadow-lg shadow-red-600/30">Eliminar</button>
                    </div>
                  </div>
                </div>
              )}

              {isSettingName && (
                <div className="absolute inset-0 z-[60] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
                  <div className="w-full max-w-xs bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl scale-in border dark:border-white/5">
                    <div className="w-16 h-16 bg-blue-500/20 dark:bg-amber-500/20 text-blue-600 dark:text-amber-500 rounded-full flex items-center justify-center mb-6 mx-auto">
                      <User size={32} />
                    </div>
                    <h3 className="text-xl font-bold text-center mb-2 dark:text-white">¿Quién eres?</h3>
                    <p className="text-xs text-gray-500 text-center mb-6">Elige un nombre para participar en el chat.</p>
                    <input
                      type="text"
                      maxLength={15}
                      value={userName}
                      onChange={(e) => setUserName(e.target.value)}
                      placeholder="Escribe tu apodo aquí..."
                      className="w-full bg-gray-100 dark:bg-slate-800 text-gray-900 dark:text-white px-4 py-3 rounded-2xl text-[16px] sm:text-sm mb-4 outline-none border-2 border-transparent focus:border-blue-500 dark:focus:border-amber-500 transition-all"
                    />
                    <button onClick={saveUserName} className="w-full py-3 bg-blue-600 dark:bg-amber-500 text-white dark:text-slate-950 font-bold rounded-2xl hover:opacity-90 active:scale-95 transition-all shadow-lg">
                      Comenzar a chatear
                    </button>
                  </div>
                </div>
              )}

              <div className={`shrink-0 w-full bg-white/90 dark:bg-slate-950/80 backdrop-blur-xl border-t border-gray-200 dark:border-slate-800/80 transition-all duration-300 z-20 ${isInputFocused || keyboardOpen ? 'h-0 py-0 border-0 opacity-0 overflow-hidden pointer-events-none' : 'pt-3 pb-[max(0.75rem,env(safe-area-inset-bottom,12px))] px-8 flex justify-between items-center shadow-[0_-10px_40px_rgba(0,0,0,0.05)]'}`}>
                <NavButton icon={<Radio size={22} />} label="Radio" isActive={activeTab === 'home'} onClick={() => setActiveTab('home')} isDark={isDark} />
                <NavButton icon={<MessageCircle size={22} />} label="Chat" isActive={activeTab === 'chat'} onClick={() => setActiveTab('chat')} isDark={isDark} badge={unreadCount} />
                <NavButton icon={<MonitorPlay size={22} />} label="En Vivo" isActive={activeTab === 'live'} onClick={() => setActiveTab('live')} isDark={isDark} />
                <NavButton icon={<CalendarDays size={22} />} label="Horarios" isActive={activeTab === 'schedule'} onClick={() => setActiveTab('schedule')} isDark={isDark} />
              </div>
            </div>

            <style dangerouslySetInnerHTML={{__html: `
              .custom-scrollbar::-webkit-scrollbar { width: 4px; }
              .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
              .custom-scrollbar::-webkit-scrollbar-thumb { background-color: ${isDark ? '#334155' : '#cbd5e1'}; border-radius: 20px; }
              .scale-in { animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
              @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
              .metadata-marquee-container {
                width: 100%;
                overflow: hidden;
                white-space: nowrap;
                position: relative;
              }
              .metadata-marquee-track {
                display: inline-flex;
                align-items: center;
                gap: 3rem;
                min-width: max-content;
                font-size: 1.02rem;
                font-weight: 700;
                line-height: 1.2;
                animation: metadataScroll 24s linear infinite;
                will-change: transform;
              }
              @keyframes metadataScroll {
                0% { transform: translateX(0); }
                100% { transform: translateX(calc(-50% - 1.5rem)); }
              }
              @media (prefers-reduced-motion: reduce) {
                .metadata-marquee-track {
                  animation: none;
                }
              }
              .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; }
              .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
              @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
            `}} />
          </div>
        );
      }

      function NavButton({ icon, label, isActive, onClick, isDark, badge }) {
        return (
          <button onClick={onClick} className="flex flex-col items-center justify-center p-2 transition-all duration-300 relative group">
            <div className={`mb-1 transition-transform duration-300 ${isActive ? '-translate-y-1 scale-110' : 'group-hover:scale-105'} ${isActive ? (isDark ? 'text-amber-500' : 'text-blue-600') : 'text-gray-500'}`}>
              {icon}
            </div>
            <span className={`text-[9px] font-medium transition-all duration-300 ${isActive ? 'opacity-100' : 'opacity-70'} ${isActive ? (isDark ? 'text-amber-500' : 'text-blue-600') : 'text-gray-500'}`}>
              {label}
            </span>

            {badge > 0 && (
              <div className="absolute top-1 right-1 bg-red-500 text-white text-[8px] font-black h-4 w-4 flex items-center justify-center rounded-full border-2 border-white dark:border-slate-950 animate-bounce shadow-lg">
                {badge > 9 ? '9+' : badge}
              </div>
            )}

            {isActive && (
              <div className={`absolute -bottom-1 h-1 w-1 rounded-full ${isDark ? 'bg-amber-500' : 'bg-blue-600'}`}></div>
            )}
          </button>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
